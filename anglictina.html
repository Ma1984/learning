<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🇬🇧 Angličtina – Výuka slovíček</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;font-family:system-ui,sans-serif;background:linear-gradient(135deg,#1e3a5f,#1565c0,#0288d1);color:#fff;display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px}

h1{font-size:2rem;font-weight:900;text-align:center;margin-bottom:6px;letter-spacing:-0.5px;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.subtitle{font-size:1rem;opacity:.8;text-align:center;margin-bottom:28px}

.card{background:rgba(255,255,255,.13);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:24px 28px;width:100%;max-width:520px;margin-bottom:18px;box-shadow:0 4px 24px rgba(0,0,0,.2)}
.card h2{font-size:1.1rem;font-weight:800;margin-bottom:14px;opacity:.9}

/* Topic list */
.topic-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:11px;cursor:pointer;transition:background .15s;user-select:none}
.topic-item:hover{background:rgba(255,255,255,.1)}
.topic-item input[type=checkbox]{width:18px;height:18px;accent-color:#fbbf24;cursor:pointer}
.topic-name{font-weight:700;font-size:1rem}
.topic-count{font-size:.85rem;opacity:.65}

/* Mode buttons */
.mode-group{display:flex;flex-direction:column;gap:8px}
.mode-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:11px;border:2px solid rgba(255,255,255,.25);background:transparent;color:#fff;font-size:.95rem;font-weight:600;cursor:pointer;transition:border-color .15s,background .15s;text-align:left}
.mode-btn:hover{border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.08)}
.mode-btn.selected{border-color:#fbbf24;background:rgba(251,191,36,.15)}
.mode-icon{font-size:1.3rem;flex-shrink:0}

/* Word count */
.count-row{display:flex;align-items:center;gap:12px}
.count-label{font-size:.95rem;opacity:.85;flex:1}
.count-input{width:70px;padding:8px 10px;border-radius:9px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;font-size:1rem;font-weight:700;text-align:center;outline:none}
.count-input:focus{border-color:#fbbf24}

/* Start button */
.btn-start{display:block;width:100%;max-width:520px;padding:14px;border-radius:14px;border:none;background:#fbbf24;color:#1e3a5f;font-size:1.1rem;font-weight:900;cursor:pointer;transition:opacity .15s,transform .1s;box-shadow:0 4px 14px rgba(251,191,36,.4)}
.btn-start:hover{opacity:.9;transform:scale(1.02)}
.btn-start:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* Quiz */
#quiz{display:none;flex-direction:column;align-items:center;width:100%;max-width:520px;gap:16px}

.progress-bar-wrap{width:100%;height:8px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden}
.progress-bar-fill{height:100%;background:#fbbf24;border-radius:99px;transition:width .3s}

.score-row{display:flex;gap:16px;justify-content:center;font-size:1rem;font-weight:700}
.score-correct{color:#4ade80}
.score-wrong{color:#f87171}

.question-card{background:rgba(255,255,255,.13);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:28px 28px 22px;width:100%;text-align:center}
.question-lang{font-size:.8rem;font-weight:700;opacity:.6;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.question-word{font-size:2.4rem;font-weight:900;margin-bottom:6px;letter-spacing:-0.5px}
.question-direction{font-size:.9rem;opacity:.65;margin-bottom:22px}

.answer-input{width:100%;padding:13px 16px;border-radius:12px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;font-size:1.2rem;font-weight:700;outline:none;text-align:center;transition:border-color .2s}
.answer-input::placeholder{color:rgba(255,255,255,.4);font-weight:400}
.answer-input:focus{border-color:#fbbf24}
.answer-input.correct{border-color:#4ade80;background:rgba(74,222,128,.15)}
.answer-input.wrong{border-color:#f87171;background:rgba(248,113,113,.15)}

.btn-check{width:100%;padding:13px;border-radius:12px;border:none;background:#fbbf24;color:#1e3a5f;font-size:1rem;font-weight:900;cursor:pointer;transition:opacity .15s;margin-top:4px}
.btn-check:hover{opacity:.88}
.btn-check:disabled{opacity:.35;cursor:not-allowed}

.feedback-box{width:100%;border-radius:14px;padding:14px 18px;text-align:center;font-size:1rem;font-weight:700;display:none}
.feedback-box.correct{background:rgba(74,222,128,.2);border:2px solid #4ade80;color:#bbf7d0}
.feedback-box.wrong{background:rgba(248,113,113,.2);border:2px solid #f87171;color:#fecaca}
.correct-answer{font-size:.9rem;margin-top:4px;opacity:.8;font-weight:400}

.btn-next{width:100%;padding:13px;border-radius:12px;border:none;background:rgba(255,255,255,.2);color:#fff;font-size:1rem;font-weight:800;cursor:pointer;transition:background .15s;display:none}
.btn-next:hover{background:rgba(255,255,255,.3)}
.countdown{margin-top:8px;font-size:.85rem;opacity:.7;text-align:center}

/* Results */
#results{display:none;flex-direction:column;align-items:center;width:100%;max-width:520px;gap:16px}
.results-card{background:rgba(255,255,255,.13);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:32px 28px;width:100%;text-align:center}
.results-emoji{font-size:3.5rem;margin-bottom:12px}
.results-title{font-size:1.7rem;font-weight:900;margin-bottom:8px}
.results-stats{font-size:1.1rem;margin-bottom:6px;opacity:.85}
.results-pct{font-size:3rem;font-weight:900;margin:16px 0}
.results-pct.great{color:#4ade80}
.results-pct.ok{color:#fbbf24}
.results-pct.bad{color:#f87171}
.btn-again{padding:13px 30px;border-radius:12px;border:none;background:#fbbf24;color:#1e3a5f;font-size:1rem;font-weight:900;cursor:pointer;margin-top:6px}
.btn-again:hover{opacity:.88}

#setup{display:flex;flex-direction:column;align-items:center;width:100%}
</style>
</head>
<body>

<h1>🇬🇧 Angličtina</h1>
<p class="subtitle">Výuka slovíček</p>

<!-- SETUP -->
<div id="setup">
  <div class="card" id="topic-card">
    <h2>📚 Výběr tématu</h2>
    <div id="topic-list"></div>
  </div>

  <div class="card">
    <h2>🔄 Režim zkoušení</h2>
    <div class="mode-group" id="mode-group">
      <button class="mode-btn selected" data-mode="random" onclick="selectMode(this)">
        <span class="mode-icon">🎲</span>
        <div><div>Náhodně</div><div style="font-size:.8rem;opacity:.65;font-weight:400">Střídá EN→CZ a CZ→EN</div></div>
      </button>
      <button class="mode-btn" data-mode="en-cz" onclick="selectMode(this)">
        <span class="mode-icon">🇬🇧→🇨🇿</span>
        <div><div>Anglicky → Česky</div><div style="font-size:.8rem;opacity:.65;font-weight:400">Zadáš český překlad</div></div>
      </button>
      <button class="mode-btn" data-mode="cz-en" onclick="selectMode(this)">
        <span class="mode-icon">🇨🇿→🇬🇧</span>
        <div><div>Česky → Anglicky</div><div style="font-size:.8rem;opacity:.65;font-weight:400">Zadáš anglické slovíčko</div></div>
      </button>
    </div>
  </div>

  <div class="card" id="count-card" style="display:none">
    <h2>🔢 Počet slovíček</h2>
    <div class="count-row">
      <span class="count-label">Kolik slovíček chceš procvičit?</span>
      <input type="number" class="count-input" id="word-count" min="1" value="10">
    </div>
  </div>

  <button class="btn-start" id="btn-start" onclick="startQuiz()">▶ Začít zkoušení</button>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div style="width:100%;max-width:520px">
    <div style="display:flex;justify-content:space-between;font-size:.9rem;opacity:.7;margin-bottom:6px">
      <span id="progress-text">1 / 10</span>
      <span id="topic-label"></span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar" style="width:0%"></div></div>
  </div>

  <div class="score-row">
    <span class="score-correct">✅ <span id="score-correct">0</span></span>
    <span class="score-wrong">❌ <span id="score-wrong">0</span></span>
  </div>

  <div class="question-card">
    <div class="question-lang" id="question-lang">Přelož do češtiny</div>
    <div class="question-word" id="question-word">field</div>
    <div class="question-direction" id="question-direction">EN → CZ</div>
    <input type="text" class="answer-input" id="answer-input" placeholder="Napiš odpověď…" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="handleKey(event)">
  </div>

  <div class="feedback-box" id="feedback-box">
    <div id="feedback-text"></div>
    <div class="correct-answer" id="feedback-detail"></div>
  </div>

  <button class="btn-check" id="btn-check" onclick="checkAnswer()">✔ Zkontrolovat</button>
  <button class="btn-next" id="btn-next" onclick="nextQuestion()">Další slovíčko →</button>
  <div class="countdown" id="countdown-text" style="display:none"></div>
</div>

<!-- RESULTS -->
<div id="results">
  <div class="results-card">
    <div class="results-emoji" id="res-emoji">🎉</div>
    <div class="results-title">Výsledky</div>
    <div class="results-stats" id="res-stats"></div>
    <div class="results-pct" id="res-pct"></div>
    <div id="res-msg" style="opacity:.75;font-size:.95rem;margin-bottom:16px"></div>
    <button class="btn-again" onclick="backToSetup()">↺ Zkusit znovu</button>
  </div>
</div>

<script>
const TOPICS = [
  {
    id: "in-the-country",
    name: "In the Country",
    emoji: "🌾",
    words: [
      {en:"field",cz:"pole"},
      {en:"crops",cz:"plodiny"},
      {en:"farmer",cz:"farmář"},
      {en:"shed",cz:"kůlna"},
      {en:"stable",cz:"stáj"},
      {en:"barn",cz:"stodola"},
      {en:"farmyard",cz:"dvůr (na farmě)"},
      {en:"forest",cz:"les"},
      {en:"grass",cz:"tráva"},
      {en:"fence",cz:"plot"},
      {en:"lake",cz:"jezero"},
      {en:"river",cz:"řeka"},
      {en:"leaf",cz:"list"},
      {en:"plant",cz:"rostlina"},
      {en:"picnic",cz:"piknik"},
      {en:"air",cz:"vzduch"},
      {en:"country",cz:"venkov"},
      {en:"countryside",cz:"krajina"},
      {en:"tree",cz:"strom"},
      {en:"flower",cz:"květina"},
      {en:"bush",cz:"keř"},
      {en:"hill",cz:"kopec"},
      {en:"mountain",cz:"hora"},
      {en:"bridge",cz:"most"},
      {en:"sky",cz:"obloha"},
      {en:"pond",cz:"rybník"}
    ]
  }
];

let selectedMode = "random";
let quiz = { words: [], index: 0, correct: 0, wrong: 0, answered: false };
let autoTimer = null;
let countInt = null;

// --- SETUP ---

function buildTopicList() {
  const container = document.getElementById("topic-list");
  TOPICS.forEach(topic => {
    const div = document.createElement("div");
    div.className = "topic-item";
    div.innerHTML = `
      <input type="checkbox" id="topic-${topic.id}" value="${topic.id}" onchange="onTopicChange()">
      <label for="topic-${topic.id}" style="cursor:pointer;flex:1;display:flex;justify-content:space-between;align-items:center">
        <span class="topic-name">${topic.emoji} ${topic.name}</span>
        <span class="topic-count">${topic.words.length} slov</span>
      </label>`;
    container.appendChild(div);
  });
  // Pre-select first topic
  const firstCb = container.querySelector("input[type=checkbox]");
  if (firstCb) { firstCb.checked = true; onTopicChange(); }
}

function onTopicChange() {
  const checked = getCheckedTopics();
  const countCard = document.getElementById("count-card");
  const wordCountInput = document.getElementById("word-count");
  if (checked.length > 1) {
    countCard.style.display = "";
    const total = checked.reduce((s, t) => s + t.words.length, 0);
    wordCountInput.max = total;
    if (+wordCountInput.value > total) wordCountInput.value = total;
    if (+wordCountInput.value < 1) wordCountInput.value = Math.min(10, total);
  } else {
    countCard.style.display = "none";
  }
}

function getCheckedTopics() {
  return TOPICS.filter(t => {
    const cb = document.getElementById("topic-" + t.id);
    return cb && cb.checked;
  });
}

function selectMode(btn) {
  document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  selectedMode = btn.dataset.mode;
}

function startQuiz() {
  const checked = getCheckedTopics();
  if (checked.length === 0) { alert("Vyber alespoň jedno téma."); return; }

  let pool = [];
  checked.forEach(t => t.words.forEach(w => pool.push({ ...w, topic: t.name })));
  shuffle(pool);

  let words;
  if (checked.length > 1) {
    const n = Math.min(Math.max(1, +document.getElementById("word-count").value || 10), pool.length);
    words = pool.slice(0, n);
  } else {
    words = pool; // all words for single topic
  }

  // Assign direction per word
  words = words.map(w => {
    let dir = selectedMode;
    if (dir === "random") dir = Math.random() < 0.5 ? "en-cz" : "cz-en";
    return { ...w, dir };
  });

  quiz = { words, index: 0, correct: 0, wrong: 0, answered: false };

  document.getElementById("setup").style.display = "none";
  document.getElementById("results").style.display = "none";
  document.getElementById("quiz").style.display = "flex";

  const topicNames = checked.map(t => t.emoji + " " + t.name).join(", ");
  document.getElementById("topic-label").textContent = topicNames;

  renderQuestion();
}

// --- QUIZ ---

function renderQuestion() {
  clearTimeout(autoTimer);
  clearInterval(countInt);
  document.getElementById("countdown-text").style.display = "none";
  const w = quiz.words[quiz.index];
  const total = quiz.words.length;
  const pct = Math.round((quiz.index / total) * 100);

  document.getElementById("progress-text").textContent = `${quiz.index + 1} / ${total}`;
  document.getElementById("progress-bar").style.width = pct + "%";
  document.getElementById("score-correct").textContent = quiz.correct;
  document.getElementById("score-wrong").textContent = quiz.wrong;

  const input = document.getElementById("answer-input");
  input.value = "";
  input.className = "answer-input";
  input.disabled = false;

  const feedbackBox = document.getElementById("feedback-box");
  feedbackBox.style.display = "none";
  feedbackBox.className = "feedback-box";

  document.getElementById("btn-check").style.display = "";
  document.getElementById("btn-check").disabled = false;
  document.getElementById("btn-next").style.display = "none";

  quiz.answered = false;

  if (w.dir === "en-cz") {
    document.getElementById("question-lang").textContent = "Přelož do češtiny";
    document.getElementById("question-word").textContent = w.en;
    document.getElementById("question-direction").textContent = "EN → CZ";
  } else {
    document.getElementById("question-lang").textContent = "Přelož do angličtiny";
    document.getElementById("question-word").textContent = w.cz;
    document.getElementById("question-direction").textContent = "CZ → EN";
  }

  input.focus();
}

function normalize(str) {
  return str.trim().toLowerCase()
    .replace(/á/g,"a").replace(/č/g,"c").replace(/ď/g,"d")
    .replace(/[éě]/g,"e").replace(/í/g,"i").replace(/ň/g,"n")
    .replace(/ó/g,"o").replace(/ř/g,"r").replace(/š/g,"s")
    .replace(/ť/g,"t").replace(/[úů]/g,"u").replace(/ý/g,"y")
    .replace(/ž/g,"z")
    .replace(/\(.*?\)/g,"").replace(/\s+/g," ").trim();
}

function checkAnswer() {
  if (quiz.answered) return;
  const w = quiz.words[quiz.index];
  const input = document.getElementById("answer-input");
  const userRaw = input.value;
  const user = normalize(userRaw);

  const correct = w.dir === "en-cz" ? w.cz : w.en;
  const isCorrect = normalize(correct) === user || normalize(correct).split(/[,/]/).map(s=>s.trim()).some(v => v === user);

  quiz.answered = true;
  input.disabled = true;

  const feedbackBox = document.getElementById("feedback-box");
  const feedbackText = document.getElementById("feedback-text");
  const feedbackDetail = document.getElementById("feedback-detail");
  const countdownEl = document.getElementById("countdown-text");
  const btnNext = document.getElementById("btn-next");
  const isLast = quiz.index === quiz.words.length - 1;

  if (isCorrect) {
    quiz.correct++;
    input.classList.add("correct");
    confetti({particleCount:80,spread:100,origin:{y:0.6},colors:['#4ade80','#fbbf24','#60a5fa']});
    document.getElementById("score-correct").textContent = quiz.correct;
    document.getElementById("score-wrong").textContent = quiz.wrong;
    document.getElementById("btn-check").style.display = "none";
    nextQuestion();
    return;
  } else {
    quiz.wrong++;
    input.classList.add("wrong");
    feedbackBox.className = "feedback-box wrong";
    feedbackText.textContent = "❌ Špatně!";
    feedbackDetail.textContent = `Správná odpověď: ${correct}`;
    btnNext.textContent = isLast ? "Pokračovat ▶" : "Pokračovat ▶";
    let secs = 5;
    countdownEl.textContent = `Pokračuji automaticky za ${secs}s…`;
    countdownEl.style.display = "";
    countInt = setInterval(() => { secs--; countdownEl.textContent = `Pokračuji automaticky za ${secs}s…`; if (secs <= 0) clearInterval(countInt); }, 1000);
    autoTimer = setTimeout(() => nextQuestion(), 5000);
  }

  feedbackBox.style.display = "";
  document.getElementById("score-correct").textContent = quiz.correct;
  document.getElementById("score-wrong").textContent = quiz.wrong;
  document.getElementById("btn-check").style.display = "none";
  btnNext.style.display = "";
}

function handleKey(e) {
  if (e.key === "Enter") {
    if (!quiz.answered) checkAnswer();
    else nextQuestion();
  }
}

function nextQuestion() {
  clearTimeout(autoTimer);
  clearInterval(countInt);
  document.getElementById("countdown-text").style.display = "none";
  quiz.index++;
  if (quiz.index >= quiz.words.length) {
    showResults();
    return;
  }
  renderQuestion();
}

// --- RESULTS ---

function showResults() {
  document.getElementById("quiz").style.display = "none";
  document.getElementById("results").style.display = "flex";

  const total = quiz.words.length;
  const pct = Math.round((quiz.correct / total) * 100);

  document.getElementById("res-stats").textContent = `Správně: ${quiz.correct} / ${total}  ·  Špatně: ${quiz.wrong}`;
  const pctEl = document.getElementById("res-pct");
  pctEl.textContent = pct + " %";
  pctEl.className = "results-pct " + (pct >= 80 ? "great" : pct >= 50 ? "ok" : "bad");

  let emoji, msg;
  if (pct === 100) { emoji = "🏆"; msg = "Perfektní výsledek! Jsi mistr angličtiny!"; }
  else if (pct >= 80) { emoji = "🎉"; msg = "Výborně! Ještě trochu a budeš mít 100 %!"; }
  else if (pct >= 60) { emoji = "👍"; msg = "Dobrá práce! Zkus to znovu a vylepši výsledek."; }
  else if (pct >= 40) { emoji = "📚"; msg = "Ještě to chce trochu procvičit. Nevzdávej to!"; }
  else { emoji = "💪"; msg = "Nevadí, procvič si slovíčka a zkus to znovu!"; }

  document.getElementById("res-emoji").textContent = emoji;
  document.getElementById("res-msg").textContent = msg;
}

function backToSetup() {
  document.getElementById("results").style.display = "none";
  document.getElementById("setup").style.display = "flex";
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

buildTopicList();
</script>
</body>
</html>
