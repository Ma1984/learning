<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>🔥 Grammar Clash 🔥</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-gradient-to-br from-purple-500 via-pink-500 to-yellow-400 min-h-screen text-white">

<div id="app"></div>

<script>
// ================= CONFIG =================
const QUESTIONS = [
  { question: "She ___ to school every day.", options: ["goes", "is going", "gooses"], correctIndex: 0 },
  { question: "They ___ football right now.", options: ["play", "are playing", "plooting"], correctIndex: 1 },
  { question: "I usually ___ coffee in the morning.", options: ["drink", "am drinking", "drunkify"], correctIndex: 0 },
  { question: "He ___ TV at the moment.", options: ["watches", "is watching", "watchify"], correctIndex: 1 },
  { question: "We ___ dinner now.", options: ["eat", "are eating", "eatoo"], correctIndex: 1 },
  { question: "The cat ___ on the roof.", options: ["sits", "is sitting", "sitify"], correctIndex: 1 },
  { question: "You ___ very fast!", options: ["run", "are running", "runnify"], correctIndex: 1 },
  { question: "It ___ a lot in spring.", options: ["rains", "is raining", "rainify"], correctIndex: 0 },
  { question: "My friends ___ to the park every weekend.", options: ["go", "are going", "goofy"], correctIndex: 0 },
  { question: "She ___ a book right now.", options: ["reads", "is reading", "readify"], correctIndex: 1 },
  { question: "We ___ a movie tonight.", options: ["watch", "are watching", "watchify"], correctIndex: 1 },
  { question: "The dog ___ in the garden.", options: ["plays", "is playing", "playify"], correctIndex: 1 },
  { question: "I ___ breakfast at 7am every day.", options: ["eat", "am eating", "eatoo"], correctIndex: 0 },
  { question: "They ___ a new game right now.", options: ["play", "are playing", "plooting"], correctIndex: 1 },
  { question: "He ___ his homework every evening.", options: ["does", "is doing", "doofy"], correctIndex: 0 },
  { question: "We ___ to music right now.", options: ["listen", "are listening", "listeningify"], correctIndex: 1 },
  { question: "The birds ___ in the morning.", options: ["sing", "are singing", "singify"], correctIndex: 0 },
  { question: "You ___ very well!", options: ["dance", "are dancing", "danceify"], correctIndex: 1 },
  { question: "It ___ a lot in winter.", options: ["snows", "is snowing", "snowify"], correctIndex: 0 },
  { question: "My family ___ to the beach every summer.", options: ["goes", "is going", "goofy"], correctIndex: 0 },
  { question: "She ___ a song right now.", options: ["sings", "is singing", "singify"], correctIndex: 1 },
  { question: "We ___ a party tonight.", options: ["have", "are having", "haveify"], correctIndex: 1 },
  { question: "The children ___ in the park.", options: ["play", "are playing", "playify"], correctIndex: 1 },
  { question: "I ___ lunch at noon every day.", options: ["eat", "am eating", "eatoo"], correctIndex: 0 },
  { question: "They ___ a new movie right now.", options: ["watch", "are watching", "watchify"], correctIndex: 1 },
];

const FUNNY_NAMES = [
  "🧠 Brainy Banana",
  "🦄 Unicorn Teacher",
  "🤖 Grammar Bot 9000",
  "🐸 Sir Frogington",
  "🔥 Verb Slayer",
  "👽 Alien Student",
  "🍕 Pizza Master",
  "🦸 Super Student"
];
// =========================================

const SIZE = 7;

let state = {
  players: [],
  scores: [0, 0],
  wins: [0, 0],
  currentPlayer: 0,
  board: Array((SIZE * (SIZE + 1)) / 2).fill(null),
  phase: 'setup'
};

function randomName() {
  return FUNNY_NAMES[Math.floor(Math.random() * FUNNY_NAMES.length)] + " " + Math.floor(Math.random()*100);
}

function getIndex(r, c) {
  return (r * (r - 1)) / 2 + c;
}

function getNeighbors(r, c) {
  return [
    [r, c - 1], [r, c + 1],
    [r - 1, c - 1], [r - 1, c],
    [r + 1, c], [r + 1, c + 1]
  ].filter(([nr, nc]) => nr >= 1 && nr <= SIZE && nc >= 0 && nc < nr);
}

function checkWin(player) {
  const visited = new Set();

  for (let r = 1; r <= SIZE; r++) {
    for (let c = 0; c < r; c++) {
      const start = getIndex(r, c);
      if (state.board[start] !== player || visited.has(start)) continue;

      let queue = [[r, c]];
      let touchesLeft = false;
      let touchesRight = false;
      let touchesBottom = false;

      while (queue.length) {
        const [cr, cc] = queue.pop();
        const idx = getIndex(cr, cc);
        if (visited.has(idx)) continue;
        visited.add(idx);

        if (cc === 0) touchesLeft = true;
        if (cc === cr - 1) touchesRight = true;
        if (cr === SIZE) touchesBottom = true;

        for (let [nr, nc] of getNeighbors(cr, cc)) {
          const nIdx = getIndex(nr, nc);
          if (state.board[nIdx] === player && !visited.has(nIdx)) {
            queue.push([nr, nc]);
          }
        }
      }

      if (touchesLeft && touchesRight && touchesBottom) return true;
    }
  }
  return false;
}

function bigConfetti() {
  const duration = 3000;
  const end = Date.now() + duration;

  (function frame() {
    confetti({ particleCount: 40, spread: 160, origin: { x: Math.random(), y: Math.random() - 0.2 } });
    if (Date.now() < end) requestAnimationFrame(frame);
  })();
}

function renderSetup() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="flex flex-col items-center justify-center h-screen gap-4">
      <h1 class="text-4xl font-black">🔥 GRAMMAR CLASH 🔥</h1>
      <div class="space-y-3 bg-white/20 p-6 rounded-2xl backdrop-blur w-full max-w-md">
        <input id="p1" class="border p-2 w-full rounded text-black" value="${randomName()}" />
        <input id="p2" class="border p-2 w-full rounded text-black" value="${randomName()}" />
        <button onclick="startGame()" class="bg-yellow-400 hover:bg-yellow-300 text-black px-4 py-2 rounded-xl font-bold w-full">🚀 Start Game</button>
      </div>
    </div>
  `;
}

function startGame() {
  state.players = [
    document.getElementById('p1').value,
    document.getElementById('p2').value
  ];
  state.phase = 'game';
  renderGame();
}

function renderGame() {
  const app = document.getElementById('app');

  let index = 0;
  let rowsHtml = '';

  for (let row = 1; row <= SIZE; row++) {
    rowsHtml += `<div class="flex justify-center gap-2">`;

    for (let col = 0; col < row; col++) {
      const cell = state.board[index];

      rowsHtml += `
        <div onclick="selectCell(${index})"
          class="w-14 h-14 flex items-center justify-center rounded-xl font-bold shadow-lg cursor-pointer transform hover:scale-110 transition
          ${cell === 0 ? 'bg-red-500 text-white' : cell === 1 ? 'bg-blue-500 text-white' : 'bg-white text-black'}">
          ${index + 1}
        </div>
      `;

      index++;
    }

    rowsHtml += `</div>`;
  }

  app.innerHTML = `
    <div class="flex flex-col min-h-screen">
      
      <div class="w-full bg-black/40 backdrop-blur p-4 flex justify-between items-center">
        <div>
          <div class="font-bold text-red-300">${state.players[0]}</div>
          <div>⭐ ${state.scores[0]} | 🏆 ${state.wins[0]}</div>
        </div>

        <div class="font-bold text-lg">🎯 ${state.players[state.currentPlayer]}</div>

        <div class="text-right">
          <div class="font-bold text-blue-300">${state.players[1]}</div>
          <div>⭐ ${state.scores[1]} | 🏆 ${state.wins[1]}</div>
        </div>
      </div>

      <div class="flex-1 flex items-center justify-center">
        <div class="space-y-2">${rowsHtml}</div>
      </div>
    </div>

    <div id="popup" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
      <div class="bg-white text-black p-6 rounded-2xl max-w-md w-full">
        <div id="popupContent"></div>
      </div>
    </div>
  `;
}

let currentCell = null;

function selectCell(index) {
  if (state.board[index] !== null) return;
  currentCell = index;
  const q = QUESTIONS[index % QUESTIONS.length];

  document.getElementById('popup').classList.remove('hidden');

  document.getElementById('popupContent').innerHTML = `
    <p class="mb-3 font-bold text-lg">❓ ${q.question}</p>
    ${shuffleArray(q.options).map((opt, i) => `
      <button onclick="answer(${i})" class="block w-full text-left border p-3 my-2 rounded-lg hover:bg-yellow-100">
        ${opt}
      </button>
    `).join('')}
  `;
}

function answer(index) {
  const q = QUESTIONS[currentCell % QUESTIONS.length];

  if (index === q.correctIndex) {
    state.board[currentCell] = state.currentPlayer;
    state.scores[state.currentPlayer]++;

    if (checkWin(state.currentPlayer)) {
      state.wins[state.currentPlayer]++;
      bigConfetti();
      document.getElementById('popup').classList.remove('hidden');
      document.getElementById('popupContent').innerHTML = `
        <div class="text-center">
          <h2 class="text-2xl font-bold mb-4">🎉 CONGRATULATIONS 🎉</h2>
          <p class="text-lg mb-4">${state.players[state.currentPlayer]} wins the game!</p>
          <button onclick="restartGame()" class="bg-yellow-400 px-4 py-2 rounded-xl font-bold">Play Again</button>
        </div>
      `;
      return;
    }
  }

  state.currentPlayer = 1 - state.currentPlayer;

  document.getElementById('popup').classList.add('hidden');
  renderGame();
}

function restartGame() {
  state.scores = [0, 0];
  state.board = Array((SIZE * (SIZE + 1)) / 2).fill(null);
  state.currentPlayer = 0;
  renderGame();
}

renderSetup();
</script>

</body>
</html>
