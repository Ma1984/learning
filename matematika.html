<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>🔢 Matematika – 1. třída</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:'Nunito','Trebuchet MS',system-ui,sans-serif;
  background:linear-gradient(150deg,#fef9c3 0%,#fce7f3 55%,#ede9fe 100%);
  min-height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  color:#1e293b;
}
#root{
  width:100%;
  max-width:900px;
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ===== HOME SCREEN ===== */
.home-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  padding:32px 20px 48px;
  width:100%;
}
.home-title{
  font-size:clamp(40px,10vw,64px);
  font-weight:900;
  color:#4c1d95;
  text-align:center;
  text-shadow:0 3px 8px rgba(0,0,0,.12);
  line-height:1.1;
}
.home-sub{
  font-size:clamp(16px,3.8vw,20px);
  color:#64748b;
  text-align:center;
  margin-top:-8px;
}
.score-pill{
  background:white;
  border-radius:999px;
  padding:12px 30px;
  font-size:clamp(20px,4.5vw,26px);
  font-weight:800;
  box-shadow:0 2px 12px rgba(0,0,0,.1);
  color:#1e293b;
}

/* ===== ACTIVITY GRID ===== */
.act-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  width:100%;
}
.ac{
  background:white;
  border-radius:24px;
  border:3px solid transparent;
  padding:28px 16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,.08);
  transition:transform .12s;
  touch-action:manipulation;
  user-select:none;
  min-height:150px;
  justify-content:center;
}
.ac:active{transform:scale(0.93)}
.ac.full{grid-column:1/-1;flex-direction:row;justify-content:center;gap:20px;padding:24px;min-height:auto}
.ac-icon{font-size:52px;line-height:1}
.ac.full .ac-icon{font-size:42px}
.ac-name{font-size:clamp(17px,4vw,22px);font-weight:800;text-align:center}
.ac.full .ac-name{font-size:clamp(19px,4.5vw,24px)}
.ac-hint{font-size:clamp(12px,2.5vw,14px);color:#94a3b8;text-align:center}
.ac-green {border-color:#10b981}
.ac-blue  {border-color:#3b82f6}
.ac-teal  {border-color:#0d9488}
.ac-orange{border-color:#f59e0b}
.ac-lime  {border-color:#84cc16}
.ac-indigo{border-color:#6366f1}
.ac-purple{border-color:#8b5cf6}
.ac-pink  {border-color:#ec4899}

/* ===== TOP BAR ===== */
.top-bar{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  position:sticky;
  top:0;
  z-index:20;
  background:rgba(255,255,255,.8);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(0,0,0,.07);
}
.back-btn{
  background:white;
  border:2px solid #e2e8f0;
  border-radius:50px;
  padding:12px 26px;
  font-size:clamp(15px,3.5vw,18px);
  font-weight:800;
  cursor:pointer;
  font-family:inherit;
  color:#334155;
  touch-action:manipulation;
  box-shadow:0 2px 8px rgba(0,0,0,.07);
  min-height:50px;
}
.back-btn:active{transform:scale(0.95)}
.score-bar-pill{
  background:white;
  border-radius:999px;
  padding:10px 22px;
  font-size:clamp(17px,3.5vw,21px);
  font-weight:800;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

/* ===== PROGRESS BAR ===== */
.progress-section{
  width:100%;
  padding:16px 20px 4px;
}
.progress-label{
  text-align:center;
  font-size:clamp(14px,3vw,17px);
  font-weight:700;
  color:#64748b;
  margin-bottom:10px;
}
.progress-track-wrap{
  position:relative;
  height:56px;
  width:100%;
}
.progress-track{
  position:absolute;
  top:50%;
  left:0;
  right:0;
  height:16px;
  transform:translateY(-50%);
  background:#e2e8f0;
  border-radius:999px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,#10b981,#3b82f6,#8b5cf6);
  border-radius:999px;
  transition:width .6s cubic-bezier(.34,1.56,.64,1);
}
.milestone-wrap{
  position:absolute;
  top:50%;
  transform:translate(-50%,-50%);
  font-size:22px;
  line-height:1;
  transition:transform .3s;
  z-index:2;
  pointer-events:none;
}
.milestone-wrap.reached{
  animation:mileBounce .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes mileBounce{
  0%{transform:translate(-50%,-50%) scale(1)}
  50%{transform:translate(-50%,-80%) scale(1.5)}
  100%{transform:translate(-50%,-50%) scale(1.1)}
}
.char-wrap{
  position:absolute;
  top:50%;
  transform:translate(-50%,-50%);
  font-size:34px;
  line-height:1;
  transition:left .6s cubic-bezier(.34,1.56,.64,1);
  z-index:3;
  pointer-events:none;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));
}
.char-icon{
  display:block;
  animation:charBounce .55s ease-in-out infinite alternate;
}
@keyframes charBounce{
  from{transform:translateY(0) rotate(-8deg);}
  to{transform:translateY(-6px) rotate(8deg);}
}

/* ===== CONTENT ===== */
.content{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:16px 20px 40px;
  gap:20px;
}
.mode-lbl{
  font-size:clamp(16px,3.8vw,20px);
  font-weight:700;
  color:#64748b;
  text-align:center;
}

/* ===== PROBLEM CARD ===== */
.pcard{
  background:white;
  border-radius:28px;
  padding:28px 20px 24px;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:22px;
  box-shadow:0 4px 28px rgba(0,0,0,.1);
}

/* ===== FORMULA ===== */
.formula{
  font-size:clamp(42px,11vw,64px);
  font-weight:900;
  text-align:center;
  color:#1e293b;
  line-height:1.15;
  display:flex;
  align-items:center;
  gap:14px;
  flex-wrap:wrap;
  justify-content:center;
}
.mbox{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:1.1em;
  height:1.1em;
  background:#fef3c7;
  border:3px dashed #f59e0b;
  border-radius:14px;
  padding:0 10px;
  color:#d97706;
}
.ans-ok{color:#059669}
.ans-no{color:#dc2626;text-decoration:line-through}

/* ===== DOT VISUAL ===== */
.dot-visual{
  display:flex;
  align-items:center;
  gap:14px;
  flex-wrap:wrap;
  justify-content:center;
}
.op-lbl{
  font-size:clamp(42px,10vw,58px);
  font-weight:900;
  color:#6366f1;
  flex-shrink:0;
  line-height:1;
}
.dots-wrap{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
.dots-sep{width:4px;height:60px;background:#e2e8f0;border-radius:2px;align-self:center}
.tf{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:5px;
  padding:8px;
  background:#f8fafc;
  border:2px solid #e2e8f0;
  border-radius:12px;
}
.dot{
  width:clamp(24px,5vw,32px);
  height:clamp(24px,5vw,32px);
  border-radius:50%;
  background:#e2e8f0;
  border:2px solid #cbd5e1;
}
.dot-r{background:#ef4444;border-color:#b91c1c}
.dot-b{background:#3b82f6;border-color:#1d4ed8}
.dot-g{background:#10b981;border-color:#047857}
.dot-o{background:#f59e0b;border-color:#b45309}
.dot{transition:transform 220ms ease,opacity 220ms ease,background 220ms ease,border-color 220ms ease}
.dot.removing{transform:scale(0.65);opacity:0.2;background:#94a3b8;border-color:#64748b}
@media(prefers-reduced-motion:reduce){.dot{transition:none}}

/* ===== NUMBER LINE ANSWER INPUT ===== */
.nl-inst{
  font-size:clamp(22px,5.5vw,36px);
  font-weight:800;
  text-align:center;
  color:#1e293b;
}
.nl-target{color:#7c3aed;font-size:1.2em}
/* Number line: two rows, no scrolling */
.nl-rows{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:6px 0;
}
.nl-row{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:5px;
  width:100%;
}
.nl-circle{
  aspect-ratio:1/1;
  width:100%;
  border-radius:50%;
  background:white;
  border:3px solid #cbd5e1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(14px,3.2vw,20px);
  font-weight:900;
  cursor:pointer;
  font-family:inherit;
  color:#334155;
  touch-action:manipulation;
  transition:transform .12s,background .15s,border-color .15s;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
  user-select:none;
  padding:0;
  min-width:0;
}
.nl-circle:active:not(.nl-ok):not(.nl-no):not(.nl-locked){
  transform:scale(0.88);
  background:#f1f5f9;
}
.nl-ok{
  background:#10b981 !important;
  border-color:#047857 !important;
  color:white !important;
  transform:scale(1.25) !important;
  box-shadow:0 4px 16px rgba(16,185,129,.5) !important;
}
.nl-no{
  background:#ef4444 !important;
  border-color:#b91c1c !important;
  color:white !important;
  animation:shake .5s ease;
}
.nl-locked{pointer-events:none;opacity:.7}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}

/* ===== INLINE FEEDBACK ===== */
.feedback-inline{
  font-size:clamp(26px,6.5vw,38px);
  font-weight:900;
  text-align:center;
  animation:pop .4s cubic-bezier(.34,1.56,.64,1);
  padding:4px 0;
}
.fi-ok{color:#059669}
.fi-no{color:#dc2626}
@keyframes pop{
  0%{transform:scale(0.4);opacity:0}
  100%{transform:scale(1);opacity:1}
}

/* ===== COMPARE ===== */
.cmp-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
  flex-wrap:wrap;
}
.cmp-side{display:flex;flex-direction:column;align-items:center;gap:10px}
.cmp-num{
  font-size:clamp(54px,14vw,82px);
  font-weight:900;
  line-height:1;
  color:#1e293b;
}
.cmp-mid{
  font-size:clamp(40px,10vw,62px);
  font-weight:900;
  color:#94a3b8;
  width:clamp(62px,14vw,82px);
  height:clamp(62px,14vw,82px);
  display:flex;
  align-items:center;
  justify-content:center;
  border:3px dashed #cbd5e1;
  border-radius:18px;
  background:#f8fafc;
  flex-shrink:0;
}
.cmp-mid.ok{color:#059669;background:#d1fae5;border-color:#10b981;border-style:solid}
.cmp-mid.no{color:#dc2626;background:#fee2e2;border-color:#ef4444;border-style:solid}
.cmp-btns{
  display:flex;
  gap:14px;
  width:100%;
  max-width:500px;
  justify-content:center;
}
.cmp-btn{
  flex:1;
  max-width:150px;
  background:#f8fafc;
  border:3px solid #e2e8f0;
  border-radius:22px;
  padding:16px 8px;
  cursor:pointer;
  font-family:inherit;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  touch-action:manipulation;
  transition:transform .1s;
  user-select:none;
  min-height:88px;
}
.cmp-btn:active{transform:scale(0.90)}
.cmp-sym{font-size:clamp(38px,9vw,54px);font-weight:900;color:#1e293b;line-height:1}
.cmp-lbl{font-size:clamp(12px,2.5vw,14px);font-weight:700;color:#94a3b8}
.cmp-btn.ch-ok{background:#d1fae5;border-color:#10b981}
.cmp-btn.ch-ok .cmp-sym{color:#059669}
.cmp-btn.ch-no{background:#fee2e2;border-color:#ef4444}
.cmp-btn.ch-no .cmp-sym{color:#dc2626}
.cmp-btn.nl-no{animation:shake .5s ease}

/* ===== COMPLETION SCREEN ===== */
.done-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:24px;
  padding:40px 24px 60px;
  width:100%;
  text-align:center;
}
.done-emoji{
  font-size:clamp(72px,18vw,100px);
  animation:pop .6s cubic-bezier(.34,1.56,.64,1);
}
.done-title{
  font-size:clamp(32px,8vw,52px);
  font-weight:900;
  color:#4c1d95;
  line-height:1.1;
}
.done-score{
  font-size:clamp(24px,6vw,36px);
  font-weight:800;
  color:#1e293b;
}
.done-stars{
  font-size:clamp(42px,10vw,60px);
  letter-spacing:4px;
  animation:pop .5s .2s both cubic-bezier(.34,1.56,.64,1);
}
.done-btns{
  display:flex;
  flex-direction:column;
  gap:14px;
  width:100%;
  max-width:360px;
}
.done-btn{
  border:none;
  border-radius:22px;
  padding:20px 40px;
  font-size:clamp(20px,5vw,26px);
  font-weight:800;
  cursor:pointer;
  font-family:inherit;
  touch-action:manipulation;
  transition:transform .1s,opacity .1s;
}
.done-btn:active{transform:scale(0.95);opacity:.92}
.done-btn-primary{
  background:linear-gradient(135deg,#7c3aed,#4f46e5);
  color:white;
  box-shadow:0 4px 18px rgba(124,58,237,.4);
}
.done-btn-secondary{
  background:white;
  color:#334155;
  border:3px solid #e2e8f0;
  box-shadow:0 2px 8px rgba(0,0,0,.07);
}

/* ===== STATS ROW ===== */
.stats-row{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  padding:0 20px 8px;
}
.stat-chip{
  display:flex;
  align-items:center;
  gap:5px;
  background:white;
  border-radius:999px;
  padding:6px 16px;
  font-size:clamp(14px,3vw,17px);
  font-weight:800;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.stat-ok{color:#059669}
.stat-no{color:#dc2626}
.stat-tot{color:#64748b}

/* ===== BREAK SCREEN ===== */
.break-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  padding:40px 24px 60px;
  width:100%;
  text-align:center;
}
.break-emoji{font-size:clamp(72px,18vw,100px);animation:pop .6s cubic-bezier(.34,1.56,.64,1)}
.break-title{font-size:clamp(28px,7vw,44px);font-weight:900;color:#dc2626;line-height:1.1}
.break-task{
  font-size:clamp(22px,5.5vw,32px);
  font-weight:800;
  color:#1e293b;
  line-height:1.3;
  background:white;
  border-radius:22px;
  padding:22px 28px;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
  width:100%;
  max-width:500px;
}
.break-detail{font-size:clamp(15px,3.5vw,18px);color:#64748b;margin-top:4px}
.break-done-btn{
  border:none;
  border-radius:22px;
  padding:20px 48px;
  font-size:clamp(20px,5vw,28px);
  font-weight:800;
  cursor:pointer;
  font-family:inherit;
  background:linear-gradient(135deg,#10b981,#059669);
  color:white;
  box-shadow:0 4px 18px rgba(16,185,129,.4);
  touch-action:manipulation;
  transition:transform .1s;
}
.break-done-btn:active{transform:scale(0.95)}

/* ===== TRIANGLE ===== */
.tri-container{display:flex;flex-direction:column;align-items:center;gap:0;width:100%;max-width:340px}
.tri-top-row{display:flex;justify-content:center}
.tri-svg{width:220px;height:64px;overflow:visible}
.tri-bot-row{display:flex;justify-content:space-between;width:220px}
.tri-box{
  width:clamp(70px,18vw,88px);
  height:clamp(70px,18vw,88px);
  border-radius:18px;
  border:3px solid #cbd5e1;
  background:white;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(28px,7vw,40px);
  font-weight:900;
  color:#1e293b;
  box-shadow:0 3px 12px rgba(0,0,0,.1);
  flex-shrink:0;
}
.tri-box.tri-q{border-color:#f59e0b;border-style:dashed;background:#fef3c7;color:#d97706}
.tri-box.tri-ok{border-color:#10b981;border-style:solid;background:#d1fae5;color:#059669}
.tri-label{
  font-size:clamp(12px,2.5vw,14px);
  font-weight:700;
  color:#94a3b8;
  text-align:center;
  margin-top:6px;
}

/* ===== SNAKE ===== */
.snake-wrap{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0;
  width:100%;
  overflow-x:auto;
  padding:8px 4px;
}
.snake-box{
  width:clamp(64px,16vw,82px);
  height:clamp(64px,16vw,82px);
  border-radius:18px;
  border:3px solid #cbd5e1;
  background:white;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(24px,6vw,36px);
  font-weight:900;
  color:#1e293b;
  box-shadow:0 3px 12px rgba(0,0,0,.1);
  flex-shrink:0;
}
.snake-box.snake-q{border-color:#f59e0b;border-style:dashed;background:#fef3c7;color:#d97706}
.snake-box.snake-ok{border-color:#10b981;border-style:solid;background:#d1fae5;color:#059669}
.snake-conn{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 6px;
  flex-shrink:0;
}
.snake-op{font-size:clamp(14px,3.2vw,18px);font-weight:800;color:#6366f1;white-space:nowrap;line-height:1}
.snake-arr{font-size:clamp(16px,4vw,22px);color:#94a3b8;line-height:1;margin-top:2px}

/* ===== RESPONSIVE ===== */
@media(max-width:420px){
  .act-grid{grid-template-columns:1fr}
  .ac.full{grid-column:1}
  .cmp-btns{gap:8px}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
'use strict';

/* ============================================================
   CONSTANTS & STATE
============================================================ */
const TOTAL = 20;
const CHAR_MIN_PCT = 3;    // keep progress character inside track bounds
const CHAR_MAX_PCT = 97;
const STAR3_THRESHOLD = 0.85;
const STAR2_THRESHOLD = 0.60;

/* Break protection: intervals in ms after activity starts */
const BREAK_INTERVALS_MS = [5*60*1000, 10*60*1000, 15*60*1000];
const BREAK_EXERCISES = [
  {emoji:'🏋️', task:'Udělej 5 dřepů!',         detail:'Pokrč kolena, ruce dopředu – 5×'},
  {emoji:'🐸', task:'10 poskoků na místě!',     detail:'Vyskoč co nejvýš – 10×'},
  {emoji:'⭐', task:'5 hvězdic!',               detail:'Roztáhni ruce i nohy do hvězdice – 5×'},
  {emoji:'🤸', task:'5× předklon!',             detail:'Dotkni se prstů na nohách – 5×'},
  {emoji:'🚶', task:'10 kroků na místě!',       detail:'Zvedej kolena co nejvýš – 10×'},
];

// Character that marches along the progress bar (changes at milestones)
function progressChar(n){
  if(n >= TOTAL) return '🏆';
  if(n >= 15)   return '🌟';
  if(n >= 10)   return '🚀';
  if(n >= 5)    return '🐇';
  return '🐢';
}

const MILESTONES = [
  {pct:25, icon:'🌱', at:5},
  {pct:50, icon:'🌻', at:10},
  {pct:75, icon:'🌈', at:15},
  {pct:100,icon:'🏆', at:20},
];

const S = {
  screen:     'home',   // 'home' | mode name | 'done' | 'break'
  mode:       null,
  score:      0,        // total cumulative score (shown on home screen)
  gameScore:  0,        // correct answers for the current session
  wrongAttempts: 0,     // wrong attempts in current session
  streak:     0,
  problem:    null,
  problemNum: 0,        // how many problems answered correctly so far (0..TOTAL)
  locked:     false,    // prevent interaction during animation
  lastWrong:  null,     // last wrong value selected (for brief red flash)
  playStartTime: null,  // when the first activity of this visit started
  breaksDone: new Set(),// set of break indices already shown
};

/* ============================================================
   UTILITIES
============================================================ */
function rnd(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function celebrate(big){
  if(big){
    const end=Date.now()+2200;
    (function frame(){
      confetti({particleCount:40,spread:160,origin:{x:Math.random(),y:Math.random()*.5}});
      if(Date.now()<end) requestAnimationFrame(frame);
    })();
  } else {
    confetti({particleCount:50,spread:80,origin:{x:.5,y:.65},
      colors:['#FF6B6B','#4ECDC4','#FFE66D','#A8E6CF','#C3B1E1']});
  }
}

/* Returns a break exercise object if a break is due, otherwise null */
function checkBreak(){
  if(!S.playStartTime) return null;
  const elapsed = Date.now() - S.playStartTime;
  for(let i=0;i<BREAK_INTERVALS_MS.length;i++){
    if(elapsed>=BREAK_INTERVALS_MS[i] && !S.breaksDone.has(i)){
      S.breaksDone.add(i);
      return BREAK_EXERCISES[i % BREAK_EXERCISES.length];
    }
  }
  // After all 3 defined breaks, trigger every additional 5 minutes
  if(elapsed>=BREAK_INTERVALS_MS[2]){
    const extra=Math.floor((elapsed-BREAK_INTERVALS_MS[2])/(5*60*1000));
    if(extra>=1){
      const key=3+extra;
      if(!S.breaksDone.has(key)){
        S.breaksDone.add(key);
        return BREAK_EXERCISES[key % BREAK_EXERCISES.length];
      }
    }
  }
  return null;
}

function el(tag, cls, text){
  const e=document.createElement(tag);
  if(cls) e.className=cls;
  if(text!==undefined) e.textContent=text;
  return e;
}

/* Czech plural for "pokus" */
function czPluralPokusu(n){
  if(n===1) return 'pokus';
  if(n>=2 && n<=4) return 'pokusy';
  return 'pokusů';
}

/* ============================================================
   TEN-FRAME VISUALIZATION
============================================================ */
function makeTenFrame(n, colorCls){
  const frame=el('div','tf');
  for(let i=0;i<10;i++){
    const d=el('div','dot'+(i<n?' '+colorCls:''));
    frame.appendChild(d);
  }
  return frame;
}

function makeDotsVisual(n, col1='dot-r', col2='dot-b'){
  const wrap=el('div','dots-wrap');
  if(n<=10){
    wrap.appendChild(makeTenFrame(n,col1));
  } else {
    wrap.appendChild(makeTenFrame(10,col1));
    wrap.appendChild(el('div','dots-sep'));
    wrap.appendChild(makeTenFrame(n-10,col2));
  }
  return wrap;
}

/* Animated ten-frame for subtraction.
   Step 1: show 'a' filled dots (and 10-a empty).
   Step 2: remove 'b' dots right-to-left one by one.
   Result: 'a-b' filled dots remain.
   Returns the wrapper element synchronously; animation runs in the background. */
function animateSubtractionTenFrame({container, a, b, stepDelay=280, startDelay=300}){
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  a = Math.max(0, Math.min(10, a));
  b = Math.max(0, Math.min(a, b));

  container.innerHTML = '';
  const frame = el('div','tf');
  const dots = [];
  for(let i=0;i<10;i++){
    const d = el('div','dot'+(i<a?' dot-r':''));
    frame.appendChild(d);
    dots.push(d);
  }
  container.appendChild(frame);

  if(reducedMotion){
    // Skip animation — show result immediately
    let removed=0;
    for(let i=a-1; i>=0 && removed<b; i--,removed++){
      dots[i].classList.remove('dot-r');
    }
    return;
  }

  // Animate asynchronously
  (async()=>{
    await new Promise(r=>setTimeout(r, startDelay));
    let removed=0;
    for(let i=a-1; i>=0 && removed<b; i--){
      dots[i].classList.add('removing');
      removed++;
      await new Promise(r=>setTimeout(r, stepDelay));
      dots[i].classList.remove('removing','dot-r');
    }
  })();
}

/* ============================================================
   PROBLEM GENERATORS
============================================================ */
function genAddition(){
  let a,b;
  do{ a=rnd(1,10); b=rnd(1,10); } while(a+b>20);
  return {type:'add', a, b, answer:a+b};
}

function genSubtraction(){
  const answer=rnd(1,10);
  const b=rnd(1,10);
  const a=answer+b;
  if(a>20) return genSubtraction();
  return {type:'sub', a, b, answer};
}

function genMixed(){
  return Math.random()<.5 ? {...genAddition(), type:'mixed-add'} : {...genSubtraction(), type:'mixed-sub'};
}

function genMissing(){
  const vt=rnd(0,2);
  let a=null, b=null, c, answer;
  if(vt===0){
    a=rnd(1,15); answer=rnd(1,20-a); c=a+answer;
  } else if(vt===1){
    b=rnd(1,15); answer=rnd(1,20-b); c=answer+b;
  } else {
    c=rnd(1,9); answer=rnd(1,10); a=c+answer;
    if(a>20) return genMissing();
  }
  return {type:'missing', vt, a, b, c, answer};
}

function genCompare(){
  const a=rnd(1,20), b=rnd(1,20);
  const answer=a>b?'>':a<b?'<':'=';
  return {type:'compare', a, b, answer};
}

function genNumberLine(){
  const target=rnd(1,20);
  return {type:'nl', target, answer:target};
}

function genTriangle(){
  let left,right,attempts=0;
  do{ left=rnd(1,10); right=rnd(1,10); attempts++; } while(left+right>20 && attempts<100);
  const top=left+right;
  const vt=rnd(0,2); // 0=missing top, 1=missing left, 2=missing right
  const answer=vt===0?top:vt===1?left:right;
  return {type:'triangle', left, right, top, vt, answer};
}

function genSnake(){
  let a,d1,b,op1,d2,c,op2;
  let attempts=0;
  do{
    attempts++;
    a=rnd(2,15);
    op1=Math.random()<.5?'+':'-';
    d1=rnd(1,8);
    b=op1==='+'?a+d1:a-d1;
    op2=Math.random()<.5?'+':'-';
    d2=rnd(1,8);
    c=op2==='+'?b+d2:b-d2;
  } while((b<1||b>20||c<1||c>20) && attempts<200);
  const vt=rnd(0,2); // 0=hide a, 1=hide b, 2=hide c
  const answer=vt===0?a:vt===1?b:c;
  return {type:'snake', a, b, c, op1, op2, d1, d2, vt, answer};
}

function genProblem(mode){
  const gen = {
    addition:   genAddition,
    subtraction:genSubtraction,
    mixed:      genMixed,
    missing:    genMissing,
    compare:    genCompare,
    numberline: genNumberLine,
    triangle:   genTriangle,
    snake:      genSnake,
  };
  return gen[mode]();
}

/* ============================================================
   ANSWER HANDLERS
============================================================ */
function handleNumberAnswer(val){
  if(S.locked) return;
  const correct = S.problem.type==='nl' ? S.problem.target : S.problem.answer;
  if(val===correct){
    S.locked=true;
    S.score++;
    S.gameScore++;
    S.streak++;
    S.problemNum++;
    S.lastWrong=null;
    celebrate(S.streak>=5);
    render(); // show green
    setTimeout(()=>{
      S.locked=false;
      const breakEx = checkBreak();
      if(breakEx){
        S.screen='break';
        S.pendingBreak=breakEx;
      } else if(S.problemNum>=TOTAL){
        S.screen='done';
      } else {
        S.problem=genProblem(S.mode);
      }
      render();
    }, 1300);
  } else {
    S.locked=true;
    S.streak=0;
    S.wrongAttempts++;
    S.lastWrong=val;
    render(); // show red on wrong number
    setTimeout(()=>{
      S.locked=false;
      S.lastWrong=null;
      render(); // return to normal, same problem
    }, 700);
  }
}

function handleCompareAnswer(sym){
  if(S.locked) return;
  const correct=S.problem.answer;
  if(sym===correct){
    S.locked=true;
    S.score++;
    S.gameScore++;
    S.streak++;
    S.problemNum++;
    S.lastWrong=null;
    celebrate(S.streak>=5);
    render();
    setTimeout(()=>{
      S.locked=false;
      const breakEx = checkBreak();
      if(breakEx){
        S.screen='break';
        S.pendingBreak=breakEx;
      } else if(S.problemNum>=TOTAL){
        S.screen='done';
      } else {
        S.problem=genProblem(S.mode);
      }
      render();
    }, 1300);
  } else {
    S.locked=true;
    S.streak=0;
    S.wrongAttempts++;
    S.lastWrong=sym;
    render();
    setTimeout(()=>{
      S.locked=false;
      S.lastWrong=null;
      render();
    }, 700);
  }
}

/* ============================================================
   PROGRESS BAR
============================================================ */
function renderProgressBar(parent){
  const sec=el('div','progress-section');
  const lbl=el('div','progress-label',`Příklady: ${S.problemNum} / ${TOTAL}`);
  sec.appendChild(lbl);

  const trackWrap=el('div','progress-track-wrap');

  const track=el('div','progress-track');
  const fill=el('div','progress-fill');
  fill.style.width=(S.problemNum/TOTAL*100)+'%';
  track.appendChild(fill);
  trackWrap.appendChild(track);

  // Milestones
  MILESTONES.forEach(m=>{
    const ms=el('div','milestone-wrap');
    ms.style.left=m.pct+'%';
    ms.textContent=m.icon;
    if(S.problemNum>=m.at) ms.classList.add('reached');
    trackWrap.appendChild(ms);
  });

  // Walking character
  const charWrap=el('div','char-wrap');
  const pct=Math.min(100, S.problemNum/TOTAL*100);
  charWrap.style.left=Math.max(CHAR_MIN_PCT,Math.min(CHAR_MAX_PCT,pct))+'%';
  const icon=el('span','char-icon',progressChar(S.problemNum));
  charWrap.appendChild(icon);
  trackWrap.appendChild(charWrap);

  sec.appendChild(trackWrap);
  parent.appendChild(sec);

  // Stats chips row
  const stats=el('div','stats-row');
  const chipOk=el('div','stat-chip');
  chipOk.innerHTML=`<span class="stat-ok">✅</span> <span class="stat-ok">${S.gameScore}</span>`;
  const chipNo=el('div','stat-chip');
  chipNo.innerHTML=`<span class="stat-no">❌</span> <span class="stat-no">${S.wrongAttempts}</span>`;
  const chipTot=el('div','stat-chip');
  chipTot.innerHTML=`<span class="stat-tot">📝 ${S.gameScore+S.wrongAttempts} ${czPluralPokusu(S.gameScore+S.wrongAttempts)}</span>`;
  stats.appendChild(chipOk);
  stats.appendChild(chipNo);
  stats.appendChild(chipTot);
  parent.appendChild(stats);
}

/* ============================================================
   NUMBER LINE INPUT (shared by add/sub/mixed/missing/nl modes)
============================================================ */
function renderNumberLine(parent, correctAnswer){
  // True when the user just answered correctly (locked + no wrong selection pending)
  const isJustAnsweredCorrectly = S.locked && S.lastWrong===null && S.problemNum>0;

  const rows=el('div','nl-rows');

  function makeCircle(i){
    const circle=el('button','nl-circle',i);
    if(S.locked){
      circle.classList.add('nl-locked');
      if(i===correctAnswer && isJustAnsweredCorrectly) circle.classList.add('nl-ok');
      if(i===S.lastWrong) circle.classList.add('nl-no');
    } else {
      circle.addEventListener('click',()=>handleNumberAnswer(i));
    }
    return circle;
  }

  // Row 1: 1–10
  const row1=el('div','nl-row');
  for(let i=1;i<=10;i++) row1.appendChild(makeCircle(i));
  rows.appendChild(row1);

  // Row 2: 11–20
  const row2=el('div','nl-row');
  for(let i=11;i<=20;i++) row2.appendChild(makeCircle(i));
  rows.appendChild(row2);

  parent.appendChild(rows);
}

/* ============================================================
   RENDER
============================================================ */
function render(){
  const root=document.getElementById('root');
  root.innerHTML='';
  if(S.screen==='home')        renderHome(root);
  else if(S.screen==='done')   renderDone(root);
  else if(S.screen==='break')  renderBreak(root);
  else                         renderActivity(root);
}

/* ----- HOME ----- */
function renderHome(root){
  const wrap=el('div','home-wrap');
  wrap.appendChild(el('div','home-title','🔢 Matematika'));
  wrap.appendChild(el('div','home-sub','Počítání do 20  •  1. třída'));

  if(S.score>0){
    wrap.appendChild(el('div','score-pill',`⭐ ${S.score} bodů`));
  }

  const grid=el('div','act-grid');
  [
    {mode:'addition',    icon:'➕', name:'Sčítání',             hint:'příklady do 20',           cls:'ac-green'},
    {mode:'subtraction', icon:'➖', name:'Odčítání',            hint:'příklady do 20',           cls:'ac-blue'},
    {mode:'mixed',       icon:'➕➖',name:'Sčítání + Odčítání', hint:'oba druhy dohromady',      cls:'ac-teal'},
    {mode:'missing',     icon:'❓', name:'Chybějící číslo',     hint:'5 + ? = 8',               cls:'ac-purple'},
    {mode:'compare',     icon:'⚖️', name:'Porovnávání',         hint:'více • méně • stejně',     cls:'ac-orange'},
    {mode:'triangle',    icon:'🔺', name:'Trojúhelník',         hint:'levé + pravé = vrchol',    cls:'ac-lime'},
    {mode:'snake',       icon:'🐍', name:'Had',                 hint:'počítej podél hada',       cls:'ac-indigo'},
    {mode:'numberline',  icon:'📏', name:'Číselná osa',         hint:'kde je číslo?',            cls:'ac-pink full'},
  ].forEach(a=>{
    const card=el('div',`ac ${a.cls}`);
    card.innerHTML=`<div class="ac-icon">${a.icon}</div>`+
      `<div class="ac-name">${a.name}</div>`+
      `<div class="ac-hint">${a.hint}</div>`;
    card.addEventListener('click',()=>{
      if(!S.playStartTime) S.playStartTime=Date.now();
      S.screen=a.mode;
      S.mode=a.mode;
      S.problemNum=0;
      S.gameScore=0;
      S.wrongAttempts=0;
      S.locked=false;
      S.lastWrong=null;
      S.streak=0;
      S.problem=genProblem(a.mode);
      render();
    });
    grid.appendChild(card);
  });

  wrap.appendChild(grid);
  root.appendChild(wrap);
}

/* ----- ACTIVITY WRAPPER ----- */
function renderActivity(root){
  // Top bar
  const bar=el('div','top-bar');
  const back=el('button','back-btn','← Domů');
  back.addEventListener('click',()=>{ S.screen='home'; S.locked=false; render(); });
  const scoreTxt=S.streak>=3 ? `⭐ ${S.score}  🔥 ${S.streak}` : `⭐ ${S.score}`;
  bar.appendChild(back);
  bar.appendChild(el('div','score-bar-pill',scoreTxt));
  root.appendChild(bar);

  // Progress bar
  renderProgressBar(root);

  const content=el('div','content');
  root.appendChild(content);

  const p=S.problem;
  if(p.type==='add' || p.type==='sub' || p.type==='mixed-add' || p.type==='mixed-sub'){
    renderAddSub(content, p);
  } else if(p.type==='missing'){
    renderMissing(content, p);
  } else if(p.type==='compare'){
    renderCompare(content, p);
  } else if(p.type==='nl'){
    renderNL(content, p);
  } else if(p.type==='triangle'){
    renderTriangle(content, p);
  } else if(p.type==='snake'){
    renderSnake(content, p);
  }
}

/* ----- ADDITION / SUBTRACTION / MIXED ----- */
function renderAddSub(content, p){
  const isAdd = p.type==='add' || p.type==='mixed-add';
  const modeLabels = {
    add:'➕ Sčítání', sub:'➖ Odčítání',
    'mixed-add':'➕ Sčítání', 'mixed-sub':'➖ Odčítání'
  };
  const overallLabel = S.mode==='mixed' ? '➕➖ Sčítání + Odčítání' : modeLabels[p.type];
  content.appendChild(el('div','mode-lbl', overallLabel));

  const card=el('div','pcard');

  // Text formula
  const formula=el('div','formula');
  const resultSpan=el('span','mbox');
  // Show green answer after correct, or '?' when unanswered
  if(S.locked && S.lastWrong===null){
    const inner=el('span','ans-ok',p.answer);
    resultSpan.appendChild(inner);
  } else {
    resultSpan.textContent='?';
  }
  formula.appendChild(document.createTextNode(`${p.a} ${isAdd?'+':'−'} ${p.b} = `));
  formula.appendChild(resultSpan);
  card.appendChild(formula);

  // Inline feedback after wrong attempt
  if(S.locked && S.lastWrong!==null){
    card.appendChild(el('div','feedback-inline fi-no','❌ Zkus znovu!'));
  } else if(S.locked && S.lastWrong===null){
    const OK_MSGS=['🎉 Správně!','⭐ Výborně!','🌟 Skvělé!','🎯 Přesně!','🥳 Bravo!','👏 Super!'];
    card.appendChild(el('div','feedback-inline fi-ok',OK_MSGS[Math.floor(Math.random()*OK_MSGS.length)]));
  }

  content.appendChild(card);

  // Hint label
  const hintLbl=el('div','mode-lbl');
  hintLbl.style.marginTop='-4px';
  hintLbl.textContent='👇 Klikni na správné číslo';
  content.appendChild(hintLbl);

  renderNumberLine(content, p.answer);
}

/* ----- MISSING NUMBER ----- */
function renderMissing(content, p){
  content.appendChild(el('div','mode-lbl','❓ Chybějící číslo'));

  const card=el('div','pcard');
  const formula=el('div','formula');

  function numNode(n){ return document.createTextNode(String(n)); }
  function opNode(s){ const sp=el('span',null,s); sp.style.color='#6366f1'; return sp; }
  function missingNode(){
    const box=el('span','mbox');
    if(S.locked && S.lastWrong===null){
      box.appendChild(el('span','ans-ok',p.answer));
    } else {
      box.textContent='?';
    }
    return box;
  }
  function eqNode(){ const sp=el('span',null,'='); sp.style.color='#10b981'; return sp; }

  if(p.vt===0){
    formula.appendChild(numNode(p.a));
    formula.appendChild(document.createTextNode(' '));
    formula.appendChild(opNode('+'));
    formula.appendChild(document.createTextNode(' '));
    formula.appendChild(missingNode());
    formula.appendChild(document.createTextNode(' '));
    formula.appendChild(eqNode());
    formula.appendChild(document.createTextNode(` ${p.c}`));
  } else if(p.vt===1){
    formula.appendChild(missingNode());
    formula.appendChild(document.createTextNode(' '));
    formula.appendChild(opNode('+'));
    formula.appendChild(document.createTextNode(` ${p.b} `));
    formula.appendChild(eqNode());
    formula.appendChild(document.createTextNode(` ${p.c}`));
  } else {
    formula.appendChild(numNode(p.a));
    formula.appendChild(document.createTextNode(' '));
    formula.appendChild(opNode('−'));
    formula.appendChild(document.createTextNode(' '));
    formula.appendChild(missingNode());
    formula.appendChild(document.createTextNode(' '));
    formula.appendChild(eqNode());
    formula.appendChild(document.createTextNode(` ${p.c}`));
  }

  card.appendChild(formula);

  if(S.locked && S.lastWrong!==null){
    card.appendChild(el('div','feedback-inline fi-no','❌ Zkus znovu!'));
  } else if(S.locked && S.lastWrong===null){
    const OK_MSGS=['🎉 Správně!','⭐ Výborně!','🌟 Skvělé!','🎯 Přesně!','🥳 Bravo!','👏 Super!'];
    card.appendChild(el('div','feedback-inline fi-ok',OK_MSGS[Math.floor(Math.random()*OK_MSGS.length)]));
  }

  content.appendChild(card);

  const hintLbl=el('div','mode-lbl');
  hintLbl.style.marginTop='-4px';
  hintLbl.textContent='👇 Klikni na správné číslo';
  content.appendChild(hintLbl);

  renderNumberLine(content, p.answer);
}

/* ----- COMPARE ----- */
function renderCompare(content, p){
  content.appendChild(el('div','mode-lbl','⚖️ Porovnávání — co je více, co je méně?'));

  const card=el('div','pcard');
  const row=el('div','cmp-row');

  function side(n){
    const s=el('div','cmp-side');
    s.appendChild(el('div','cmp-num',n));
    return s;
  }

  row.appendChild(side(p.a));

  const mid=el('div','cmp-mid');
  if(S.locked && S.lastWrong===null){
    mid.textContent=p.answer;
    mid.classList.add('ok');
  } else if(S.locked && S.lastWrong!==null){
    mid.textContent=S.lastWrong;
    mid.classList.add('no');
  } else {
    mid.textContent='?';
  }
  row.appendChild(mid);
  row.appendChild(side(p.b));
  card.appendChild(row);

  if(S.locked && S.lastWrong!==null){
    card.appendChild(el('div','feedback-inline fi-no','❌ Zkus znovu!'));
  } else if(S.locked && S.lastWrong===null){
    const OK_MSGS=['🎉 Správně!','⭐ Výborně!','🌟 Skvělé!','🎯 Přesně!'];
    card.appendChild(el('div','feedback-inline fi-ok',OK_MSGS[Math.floor(Math.random()*OK_MSGS.length)]));
  }

  content.appendChild(card);

  if(!S.locked || S.lastWrong!==null){
    const btnRow=el('div','cmp-btns');
    [{sym:'<',lbl:'méně'},{sym:'=',lbl:'stejně'},{sym:'>',lbl:'více'}].forEach(opt=>{
      const btn=el('div','cmp-btn');
      btn.appendChild(el('span','cmp-sym',opt.sym));
      btn.appendChild(el('span','cmp-lbl',opt.lbl));
      if(S.locked && opt.sym===S.lastWrong) btn.classList.add('nl-no');
      if(!S.locked){
        btn.addEventListener('click',()=>handleCompareAnswer(opt.sym));
      } else {
        btn.style.opacity='0.6';
        btn.style.pointerEvents='none';
      }
      btnRow.appendChild(btn);
    });
    content.appendChild(btnRow);
  }
}

/* ----- NUMBER LINE FIND ----- */
function renderNL(content, p){
  content.appendChild(el('div','mode-lbl','📏 Číselná osa'));

  const card=el('div','pcard');
  const inst=el('div','nl-inst');
  inst.innerHTML=`Kde je číslo <span class="nl-target">${p.target}</span>?`;
  card.appendChild(inst);

  if(S.locked && S.lastWrong!==null){
    card.appendChild(el('div','feedback-inline fi-no','❌ Zkus znovu!'));
  } else if(S.locked && S.lastWrong===null){
    const OK_MSGS=['🎉 Správně!','⭐ Výborně!','🌟 Skvělé!','🎯 Přesně!'];
    card.appendChild(el('div','feedback-inline fi-ok',OK_MSGS[Math.floor(Math.random()*OK_MSGS.length)]));
  }

  content.appendChild(card);

  const hintLbl=el('div','mode-lbl');
  hintLbl.style.marginTop='-4px';
  hintLbl.textContent='👇 Klikni na správné číslo';
  content.appendChild(hintLbl);

  renderNumberLine(content, p.target);
}

/* ----- COMPLETION SCREEN ----- */
function renderDone(root){
  const wrap=el('div','done-wrap');
  const w=S.wrongAttempts;
  const emoji = w===0?'🏆':w<=3?'🎉':w<=7?'😊':'💪';
  wrap.appendChild(el('div','done-emoji',emoji));
  wrap.appendChild(el('div','done-title','Hotovo!'));

  const scoreEl=el('div','done-score');
  scoreEl.innerHTML=`✅ Správně: <strong>${S.gameScore}</strong> z ${TOTAL}`;
  if(w>0) scoreEl.innerHTML+=`&nbsp;&nbsp;❌ Chyby: <strong>${w}</strong>`;
  wrap.appendChild(scoreEl);

  // Stars based on wrong attempts – motivational but honest
  let stars, starMsg;
  if(w===0){
    stars='⭐⭐⭐'; starMsg='Perfektní – ani jedna chyba! 🥇';
  } else if(w<=3){
    stars='⭐⭐⭐'; starMsg='Výborně! Jen pár zaváhání 👏';
  } else if(w<=7){
    stars='⭐⭐'; starMsg='Moc dobře! Příště to půjde ještě líp 💪';
  } else {
    stars='⭐'; starMsg='Dobrá práce! Cvičíme dál a bude to lepší 🌱';
  }
  wrap.appendChild(el('div','done-stars',stars));
  const msgEl=el('div','mode-lbl',starMsg);
  msgEl.style.fontSize='clamp(16px,3.5vw,20px)';
  wrap.appendChild(msgEl);

  if(w===0) celebrate(true);

  const btns=el('div','done-btns');

  const again=el('button','done-btn done-btn-primary','🔄 Hrát znovu');
  again.addEventListener('click',()=>{
    S.screen=S.mode;
    S.problemNum=0;
    S.gameScore=0;
    S.wrongAttempts=0;
    S.streak=0;
    S.locked=false;
    S.lastWrong=null;
    S.problem=genProblem(S.mode);
    render();
  });
  btns.appendChild(again);

  const home=el('button','done-btn done-btn-secondary','🏠 Domů');
  home.addEventListener('click',()=>{ S.screen='home'; render(); });
  btns.appendChild(home);

  wrap.appendChild(btns);
  root.appendChild(wrap);
}

/* ----- BREAK SCREEN ----- */
function renderBreak(root){
  const ex=S.pendingBreak || BREAK_EXERCISES[0];
  const wrap=el('div','break-wrap');
  wrap.appendChild(el('div','break-emoji',ex.emoji));
  wrap.appendChild(el('div','break-title','Čas na pohyb! 🏃'));
  const task=el('div','break-task');
  task.innerHTML=`<div>${ex.task}</div><div class="break-detail">${ex.detail}</div>`;
  wrap.appendChild(task);
  wrap.appendChild(el('div','mode-lbl','Udělej cvičení a pak pokračuj!'));
  const btn=el('button','break-done-btn','✅ Hotovo, pokračuji!');
  btn.addEventListener('click',()=>{
    S.pendingBreak=null;
    if(S.problemNum>=TOTAL){
      S.screen='done';
    } else {
      S.screen=S.mode;
      S.problem=genProblem(S.mode);
    }
    render();
  });
  wrap.appendChild(btn);
  root.appendChild(wrap);
}

/* ----- TRIANGLE ----- */
function renderTriangle(content, p){
  content.appendChild(el('div','mode-lbl','🔺 Součtový trojúhelník'));

  const card=el('div','pcard');

  // Build the visual triangle
  const triContainer=el('div','tri-container');

  function triBox(val, isMissing){
    const box=el('div','tri-box');
    if(isMissing){
      if(S.locked && S.lastWrong===null){
        box.classList.add('tri-ok');
        box.textContent=p.answer;
      } else {
        box.classList.add('tri-q');
        box.textContent='?';
      }
    } else {
      box.textContent=val;
    }
    return box;
  }

  // Top row
  const topRow=el('div','tri-top-row');
  topRow.appendChild(triBox(p.top, p.vt===0));
  triContainer.appendChild(topRow);

  // SVG connecting lines
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class','tri-svg');
  svg.setAttribute('viewBox','0 0 220 64');
  svg.setAttribute('preserveAspectRatio','none');
  const l1=document.createElementNS('http://www.w3.org/2000/svg','line');
  l1.setAttribute('x1','110');l1.setAttribute('y1','0');
  l1.setAttribute('x2','20'); l1.setAttribute('y2','64');
  l1.setAttribute('stroke','#cbd5e1');l1.setAttribute('stroke-width','3');
  l1.setAttribute('stroke-linecap','round');
  const l2=document.createElementNS('http://www.w3.org/2000/svg','line');
  l2.setAttribute('x1','110');l2.setAttribute('y1','0');
  l2.setAttribute('x2','200');l2.setAttribute('y2','64');
  l2.setAttribute('stroke','#cbd5e1');l2.setAttribute('stroke-width','3');
  l2.setAttribute('stroke-linecap','round');
  svg.appendChild(l1);svg.appendChild(l2);
  triContainer.appendChild(svg);

  // Bottom row
  const botRow=el('div','tri-bot-row');
  botRow.appendChild(triBox(p.left, p.vt===1));
  botRow.appendChild(triBox(p.right, p.vt===2));
  triContainer.appendChild(botRow);

  triContainer.appendChild(el('div','tri-label','Levé + Pravé = Vrchol'));

  card.appendChild(triContainer);

  if(S.locked && S.lastWrong!==null){
    card.appendChild(el('div','feedback-inline fi-no','❌ Zkus znovu!'));
  } else if(S.locked && S.lastWrong===null){
    const OK_MSGS=['🎉 Správně!','⭐ Výborně!','🌟 Skvělé!','🎯 Přesně!','🥳 Bravo!','👏 Super!'];
    card.appendChild(el('div','feedback-inline fi-ok',OK_MSGS[Math.floor(Math.random()*OK_MSGS.length)]));
  }

  content.appendChild(card);

  const hintLbl=el('div','mode-lbl');
  hintLbl.style.marginTop='-4px';
  hintLbl.textContent='👇 Klikni na správné číslo';
  content.appendChild(hintLbl);

  renderNumberLine(content, p.answer);
}

/* ----- SNAKE ----- */
function renderSnake(content, p){
  content.appendChild(el('div','mode-lbl','🐍 Součtový had'));

  const card=el('div','pcard');

  function snakeBox(val, isMissing){
    const box=el('div','snake-box');
    if(isMissing){
      if(S.locked && S.lastWrong===null){
        box.classList.add('snake-ok');
        box.textContent=p.answer;
      } else {
        box.classList.add('snake-q');
        box.textContent='?';
      }
    } else {
      box.textContent=val;
    }
    return box;
  }

  function snakeConn(op, delta){
    const conn=el('div','snake-conn');
    conn.appendChild(el('span','snake-op',`${op}${delta}`));
    conn.appendChild(el('span','snake-arr','→'));
    return conn;
  }

  const snakeWrap=el('div','snake-wrap');
  snakeWrap.appendChild(snakeBox(p.a, p.vt===0));
  snakeWrap.appendChild(snakeConn(p.op1, p.d1));
  snakeWrap.appendChild(snakeBox(p.b, p.vt===1));
  snakeWrap.appendChild(snakeConn(p.op2, p.d2));
  snakeWrap.appendChild(snakeBox(p.c, p.vt===2));
  card.appendChild(snakeWrap);

  if(S.locked && S.lastWrong!==null){
    card.appendChild(el('div','feedback-inline fi-no','❌ Zkus znovu!'));
  } else if(S.locked && S.lastWrong===null){
    const OK_MSGS=['🎉 Správně!','⭐ Výborně!','🌟 Skvělé!','🎯 Přesně!','🥳 Bravo!','👏 Super!'];
    card.appendChild(el('div','feedback-inline fi-ok',OK_MSGS[Math.floor(Math.random()*OK_MSGS.length)]));
  }

  content.appendChild(card);

  const hintLbl=el('div','mode-lbl');
  hintLbl.style.marginTop='-4px';
  hintLbl.textContent='👇 Klikni na správné číslo';
  content.appendChild(hintLbl);

  renderNumberLine(content, p.answer);
}
