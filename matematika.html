<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>🔢 Matematika – 1. třída</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:'Nunito','Trebuchet MS',system-ui,sans-serif;
  background:linear-gradient(150deg,#fef9c3 0%,#fce7f3 55%,#ede9fe 100%);
  min-height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  color:#1e293b;
}

/* ===== ROOT ===== */
#root{
  width:100%;
  max-width:820px;
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ===== HOME SCREEN ===== */
.home-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
  padding:28px 16px 40px;
  width:100%;
}
.home-title{
  font-size:clamp(38px,10vw,60px);
  font-weight:900;
  color:#4c1d95;
  text-align:center;
  text-shadow:0 3px 6px rgba(0,0,0,.1);
}
.home-sub{
  font-size:clamp(14px,3.5vw,18px);
  color:#64748b;
  text-align:center;
  margin-top:-8px;
}
.score-pill{
  background:white;
  border-radius:999px;
  padding:10px 26px;
  font-size:clamp(18px,4vw,22px);
  font-weight:800;
  box-shadow:0 2px 12px rgba(0,0,0,.1);
  color:#1e293b;
}

/* ===== ACTIVITY GRID ===== */
.act-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
  width:100%;
}
.ac{
  background:white;
  border-radius:22px;
  border:3px solid transparent;
  padding:26px 14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  cursor:pointer;
  box-shadow:0 4px 18px rgba(0,0,0,.08);
  transition:transform .12s;
  touch-action:manipulation;
  user-select:none;
}
.ac:active{transform:scale(0.94)}
.ac.full{grid-column:1/-1;flex-direction:row;justify-content:center;gap:18px;padding:22px 24px}
.ac-icon{font-size:46px;line-height:1}
.ac.full .ac-icon{font-size:38px}
.ac-name{font-size:clamp(16px,4vw,20px);font-weight:800;text-align:center}
.ac.full .ac-name{font-size:clamp(18px,4.5vw,22px)}
.ac-hint{font-size:13px;color:#94a3b8;text-align:center}
.ac-green {border-color:#10b981}
.ac-blue  {border-color:#3b82f6}
.ac-orange{border-color:#f59e0b}
.ac-purple{border-color:#8b5cf6}
.ac-pink  {border-color:#ec4899}

/* ===== ACTIVITY SCREEN ===== */
.top-bar{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 16px;
  position:sticky;
  top:0;
  z-index:20;
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(0,0,0,.06);
}
.back-btn{
  background:white;
  border:2px solid #e2e8f0;
  border-radius:50px;
  padding:10px 22px;
  font-size:clamp(14px,3.5vw,17px);
  font-weight:800;
  cursor:pointer;
  font-family:inherit;
  color:#334155;
  touch-action:manipulation;
  box-shadow:0 2px 8px rgba(0,0,0,.07);
}
.back-btn:active{transform:scale(0.95)}

.content{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:18px 16px 40px;
  gap:18px;
}
.mode-lbl{
  font-size:clamp(15px,3.5vw,18px);
  font-weight:700;
  color:#64748b;
  text-align:center;
}

/* ===== PROBLEM CARD ===== */
.pcard{
  background:white;
  border-radius:26px;
  padding:28px 20px;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:22px;
  box-shadow:0 4px 28px rgba(0,0,0,.1);
}

/* ===== FORMULA ===== */
.formula{
  font-size:clamp(38px,10vw,58px);
  font-weight:900;
  text-align:center;
  color:#1e293b;
  line-height:1.15;
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
}
.mbox{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:1.1em;
  height:1.1em;
  background:#fef3c7;
  border:3px dashed #f59e0b;
  border-radius:14px;
  padding:0 10px;
  color:#d97706;
}
.ans-ok{color:#059669}
.ans-no{color:#dc2626;text-decoration:line-through}

/* ===== DOT VISUAL (ten-frame) ===== */
.dot-visual{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
}
.op-lbl{
  font-size:clamp(38px,10vw,54px);
  font-weight:900;
  color:#6366f1;
  flex-shrink:0;
  line-height:1;
}
.dots-wrap{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
.dots-sep{width:4px;height:56px;background:#e2e8f0;border-radius:2px;align-self:center}
.tf{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:5px;
  padding:8px;
  background:#f8fafc;
  border:2px solid #e2e8f0;
  border-radius:12px;
}
.dot{
  width:clamp(22px,5vw,30px);
  height:clamp(22px,5vw,30px);
  border-radius:50%;
  background:#e2e8f0;
  border:2px solid #cbd5e1;
}
.dot-r{background:#ef4444;border-color:#b91c1c}
.dot-b{background:#3b82f6;border-color:#1d4ed8}
.dot-g{background:#10b981;border-color:#047857}
.dot-o{background:#f59e0b;border-color:#b45309}

/* ===== CHOICE GRID ===== */
.ch-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
  width:100%;
  max-width:480px;
}
.ch-btn{
  background:#f8fafc;
  border:3px solid #e2e8f0;
  border-radius:20px;
  padding:18px 10px;
  font-size:clamp(32px,8.5vw,48px);
  font-weight:900;
  cursor:pointer;
  font-family:inherit;
  color:#1e293b;
  touch-action:manipulation;
  transition:transform .1s,background .1s;
  line-height:1;
  user-select:none;
}
.ch-btn:active:not(.ch-ok):not(.ch-no){transform:scale(0.92);background:#f1f5f9}
.ch-ok{background:#d1fae5;border-color:#10b981;color:#065f46}
.ch-no{background:#fee2e2;border-color:#ef4444;color:#7f1d1d}

/* ===== COMPARE ===== */
.cmp-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
  flex-wrap:wrap;
}
.cmp-side{display:flex;flex-direction:column;align-items:center;gap:10px}
.cmp-num{
  font-size:clamp(52px,14vw,80px);
  font-weight:900;
  line-height:1;
  color:#1e293b;
}
.cmp-mid{
  font-size:clamp(38px,10vw,60px);
  font-weight:900;
  color:#94a3b8;
  width:clamp(58px,14vw,78px);
  height:clamp(58px,14vw,78px);
  display:flex;
  align-items:center;
  justify-content:center;
  border:3px dashed #cbd5e1;
  border-radius:16px;
  background:#f8fafc;
  flex-shrink:0;
}
.cmp-mid.ok{color:#059669;background:#d1fae5;border-color:#10b981;border-style:solid}
.cmp-mid.no{color:#dc2626;background:#fee2e2;border-color:#ef4444;border-style:solid}
.cmp-btns{display:flex;gap:12px;width:100%;max-width:480px;justify-content:center}
.cmp-btn{
  flex:1;
  max-width:140px;
  background:#f8fafc;
  border:3px solid #e2e8f0;
  border-radius:20px;
  padding:14px 8px;
  cursor:pointer;
  font-family:inherit;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  touch-action:manipulation;
  transition:transform .1s;
  user-select:none;
}
.cmp-btn:active{transform:scale(0.92)}
.cmp-sym{font-size:clamp(36px,9vw,52px);font-weight:900;color:#1e293b;line-height:1}
.cmp-lbl{font-size:13px;font-weight:700;color:#94a3b8}
.cmp-btn.ch-ok{background:#d1fae5;border-color:#10b981}
.cmp-btn.ch-ok .cmp-sym{color:#059669}
.cmp-btn.ch-no{background:#fee2e2;border-color:#ef4444}
.cmp-btn.ch-no .cmp-sym{color:#dc2626}

/* ===== NUMBER LINE ===== */
.nl-inst{
  font-size:clamp(22px,5.5vw,34px);
  font-weight:800;
  text-align:center;
  color:#1e293b;
}
.nl-target{color:#7c3aed;font-size:1.3em}
.nl-outer{
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  padding:14px 0;
  cursor:grab;
}
.nl-outer:active{cursor:grabbing}
.nl{
  display:flex;
  align-items:center;
  width:max-content;
  padding:8px 20px;
}
.nl-circle{
  width:clamp(40px,8vw,50px);
  height:clamp(40px,8vw,50px);
  border-radius:50%;
  background:white;
  border:3px solid #cbd5e1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(14px,3.5vw,19px);
  font-weight:800;
  cursor:pointer;
  font-family:inherit;
  color:#334155;
  touch-action:manipulation;
  transition:transform .1s,background .15s;
  flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}
.nl-circle:active:not(.nl-ok):not(.nl-no){transform:scale(0.88)}
.nl-ok{background:#10b981;border-color:#047857;color:white;transform:scale(1.2);box-shadow:0 4px 12px rgba(16,185,129,.4)}
.nl-no{background:#ef4444;border-color:#b91c1c;color:white}
.nl-conn{height:4px;width:clamp(6px,1.5vw,12px);background:#cbd5e1;flex-shrink:0}

/* ===== FEEDBACK ===== */
.feedback{
  width:100%;
  max-width:480px;
  padding:18px 24px;
  border-radius:20px;
  font-size:clamp(20px,5vw,28px);
  font-weight:800;
  text-align:center;
  animation:pop .4s cubic-bezier(.34,1.56,.64,1);
}
.fb-ok{background:#d1fae5;color:#065f46}
.fb-no{background:#fee2e2;color:#7f1d1d}

@keyframes pop{
  0%{transform:scale(0.5);opacity:0}
  100%{transform:scale(1);opacity:1}
}

/* ===== NEXT BUTTON ===== */
.next-btn{
  background:linear-gradient(135deg,#7c3aed,#4f46e5);
  color:white;
  border:none;
  border-radius:20px;
  padding:18px 52px;
  font-size:clamp(20px,5vw,26px);
  font-weight:800;
  cursor:pointer;
  font-family:inherit;
  box-shadow:0 4px 18px rgba(124,58,237,.4);
  touch-action:manipulation;
  transition:transform .1s,opacity .1s;
  user-select:none;
}
.next-btn:active{transform:scale(0.95);opacity:.92}

/* ===== RESPONSIVE ===== */
@media(max-width:380px){
  .act-grid{grid-template-columns:1fr}
  .ac.full{grid-column:1}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
'use strict';

/* ============================================================
   STATE
============================================================ */
const S = {
  screen: 'home',
  score: 0,
  streak: 0,
  answered: null,   // null | true | false
  selected: null,
  problem: null,
};

/* ============================================================
   UTILITIES
============================================================ */
function rnd(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function makeChoices(correct, min=0, max=20){
  const wrongs=new Set();
  // Prefer nearby values so they are plausible distractors
  for(let d=1; d<=6 && wrongs.size<3; d++){
    if(Math.random()<.75 && correct+d<=max) wrongs.add(correct+d);
    if(wrongs.size<3 && Math.random()<.75 && correct-d>=min) wrongs.add(correct-d);
  }
  // Fill if still not 3
  for(let d=1; wrongs.size<3 && d<=22; d++){
    if(correct+d<=max && !wrongs.has(correct+d)) wrongs.add(correct+d);
    if(wrongs.size<3 && correct-d>=min && !wrongs.has(correct-d)) wrongs.add(correct-d);
  }
  return shuffle([correct,...[...wrongs].slice(0,3)]);
}

function celebrate(big){
  if(big){
    const end=Date.now()+2500;
    (function frame(){
      confetti({particleCount:35,spread:150,origin:{x:Math.random(),y:Math.random()*.55}});
      if(Date.now()<end) requestAnimationFrame(frame);
    })();
  } else {
    confetti({particleCount:55,spread:85,origin:{x:.5,y:.65},
      colors:['#FF6B6B','#4ECDC4','#FFE66D','#A8E6CF','#C3B1E1']});
  }
}

function el(tag, cls, text){
  const e=document.createElement(tag);
  if(cls) e.className=cls;
  if(text!==undefined) e.textContent=text;
  return e;
}

/* ============================================================
   TEN-FRAME VISUALIZATION
   Represents a number as a 5×2 grid of filled/empty dots.
   Numbers 1–10: single frame; 11–20: two frames.
============================================================ */
function makeTenFrame(n, colorCls){
  const frame=el('div','tf');
  for(let i=0;i<10;i++){
    const d=el('div','dot'+(i<n?' '+colorCls:''));
    frame.appendChild(d);
  }
  return frame;
}

function makeDotsVisual(n, col1='dot-r', col2='dot-b'){
  const wrap=el('div','dots-wrap');
  if(n<=10){
    wrap.appendChild(makeTenFrame(n,col1));
  } else {
    wrap.appendChild(makeTenFrame(10,col1));
    const sep=el('div','dots-sep');
    wrap.appendChild(sep);
    wrap.appendChild(makeTenFrame(n-10,col2));
  }
  return wrap;
}

/* ============================================================
   PROBLEM GENERATORS
============================================================ */
function genAddition(){
  let a,b;
  do{ a=rnd(0,10); b=rnd(0,10); } while(a+b>20);
  const answer=a+b;
  return {type:'add', a, b, answer, choices:makeChoices(answer)};
}

function genSubtraction(){
  const answer=rnd(0,10);
  const b=rnd(0,10);
  const a=answer+b;
  if(a>20) return genSubtraction();
  return {type:'sub', a, b, answer, choices:makeChoices(answer)};
}

function genMissing(){
  // variant 0: a + ? = c
  // variant 1: ? + b = c
  // variant 2: a − ? = c
  const vt=rnd(0,2);
  let a=null, b=null, c, answer;
  if(vt===0){
    a=rnd(0,15); answer=rnd(0,20-a); c=a+answer;
  } else if(vt===1){
    b=rnd(0,15); answer=rnd(0,20-b); c=answer+b;
  } else {
    c=rnd(0,10); answer=rnd(0,10); a=c+answer;
    if(a>20) return genMissing();
  }
  return {type:'missing', vt, a, b, c, answer, choices:makeChoices(answer)};
}

function genCompare(){
  const a=rnd(0,20), b=rnd(0,20);
  const answer=a>b?'>':a<b?'<':'=';
  return {type:'compare', a, b, answer};
}

function genNumberLine(){
  const target=rnd(0,20);
  return {type:'nl', target, answer:target};
}

function genProblem(mode){
  return {addition:genAddition, subtraction:genSubtraction,
          missing:genMissing, compare:genCompare, numberline:genNumberLine}[mode]();
}

/* ============================================================
   ANSWER HANDLER
============================================================ */
function doAnswer(selected, correct){
  S.selected=selected;
  const ok = (typeof correct==='number') ? selected===correct : selected===correct;
  S.answered=ok;
  if(ok){ S.score++; S.streak++; celebrate(S.streak>=5); }
  else { S.streak=0; }
  render();
}

/* ============================================================
   CHOICE GRID (multiple-choice number buttons)
============================================================ */
function makeChoiceGrid(choices, correct, onClickFn){
  const grid=el('div','ch-grid');
  choices.forEach(c=>{
    const btn=el('button','ch-btn',c);
    if(onClickFn===null){
      if(c===correct) btn.classList.add('ch-ok');
      else if(c===S.selected) btn.classList.add('ch-no');
    } else {
      btn.addEventListener('click',()=>onClickFn(c));
    }
    grid.appendChild(btn);
  });
  return grid;
}

/* ============================================================
   RENDER
============================================================ */
function render(){
  const root=document.getElementById('root');
  root.innerHTML='';
  if(S.screen==='home') renderHome(root);
  else renderActivity(root);
}

/* ----- HOME ----- */
function renderHome(root){
  const wrap=el('div','home-wrap');

  const title=el('div','home-title','🔢 Matematika');
  const sub=el('div','home-sub','Počítání do 20  •  1. třída');
  wrap.appendChild(title);
  wrap.appendChild(sub);

  if(S.score>0){
    wrap.appendChild(el('div','score-pill',`⭐ ${S.score} bodů`));
  }

  const grid=el('div','act-grid');
  [
    {mode:'addition',    icon:'➕', name:'Sčítání',           hint:'do 20',         cls:'ac-green'},
    {mode:'subtraction', icon:'➖', name:'Odčítání',          hint:'do 20',         cls:'ac-blue'},
    {mode:'compare',     icon:'⚖️', name:'Porovnávání',       hint:'více • méně',   cls:'ac-orange'},
    {mode:'missing',     icon:'❓', name:'Chybějící číslo',   hint:'5 + ? = 8',     cls:'ac-purple'},
    {mode:'numberline',  icon:'📏', name:'Číselná osa',       hint:'kde je číslo?', cls:'ac-pink full'},
  ].forEach(a=>{
    const card=el('div',`ac ${a.cls}`);
    card.innerHTML=`<div class="ac-icon">${a.icon}</div>`+
      `<div class="ac-name">${a.name}</div>`+
      `<div class="ac-hint">${a.hint}</div>`;
    card.addEventListener('click',()=>{
      S.screen=a.mode; S.answered=null; S.selected=null;
      S.problem=genProblem(a.mode);
      render();
    });
    grid.appendChild(card);
  });

  wrap.appendChild(grid);
  root.appendChild(wrap);
}

/* ----- ACTIVITY WRAPPER ----- */
function renderActivity(root){
  // Sticky top bar
  const bar=el('div','top-bar');
  const back=el('button','back-btn','← Domů');
  back.addEventListener('click',()=>{ S.screen='home'; S.answered=null; render(); });
  const scoreTxt=S.streak>=3 ? `⭐ ${S.score}  🔥 ${S.streak}` : `⭐ ${S.score}`;
  bar.appendChild(back);
  bar.appendChild(el('div','score-pill',scoreTxt));
  root.appendChild(bar);

  const content=el('div','content');
  root.appendChild(content);

  const p=S.problem;
  if(p.type==='add'||p.type==='sub')  renderAddSub(content,p);
  else if(p.type==='missing')          renderMissing(content,p);
  else if(p.type==='compare')          renderCompare(content,p);
  else if(p.type==='nl')               renderNL(content,p);

  // Feedback + Next button after answering
  if(S.answered!==null){
    const OK_MSGS=['🎉 Správně!','⭐ Výborně!','🌟 Skvělé!','🎯 Přesně tak!','🥳 Bravo!','👏 Super!'];
    const fb=el('div','feedback '+(S.answered?'fb-ok':'fb-no'));
    if(S.answered){
      fb.textContent=OK_MSGS[Math.floor(Math.random()*OK_MSGS.length)];
    } else {
      const ans=p.type==='nl'?p.target:p.answer;
      fb.innerHTML=`💡 Správná odpověď je <strong>${ans}</strong>`;
    }
    content.appendChild(fb);

    const nxt=el('button','next-btn','→ Další otázka');
    nxt.addEventListener('click',()=>{
      S.problem=genProblem(S.screen); S.answered=null; S.selected=null; render();
    });
    content.appendChild(nxt);
  }
}

/* ----- ADDITION / SUBTRACTION ----- */
function renderAddSub(content, p){
  const isAdd=p.type==='add';
  content.appendChild(el('div','mode-lbl',isAdd?'➕ Sčítání':'➖ Odčítání'));

  const card=el('div','pcard');

  // Ten-frame dot visualization
  const dv=el('div','dot-visual');
  dv.appendChild(makeDotsVisual(p.a,'dot-r','dot-r'));
  const opEl=el('div','op-lbl',isAdd?'+':'−');
  dv.appendChild(opEl);
  dv.appendChild(makeDotsVisual(p.b,'dot-b','dot-b'));
  card.appendChild(dv);

  // Text formula
  const formula=el('div','formula');
  const resultSpan=document.createElement('span');
  if(S.answered!==null){
    resultSpan.className='mbox';
    const inner=document.createElement('span');
    inner.className=S.answered?'ans-ok':'ans-no';
    inner.textContent=p.answer;
    resultSpan.appendChild(inner);
  } else {
    resultSpan.className='mbox';
    resultSpan.textContent='?';
  }
  formula.appendChild(document.createTextNode(`${p.a} ${isAdd?'+':'−'} ${p.b} = `));
  formula.appendChild(resultSpan);
  card.appendChild(formula);
  content.appendChild(card);

  content.appendChild(
    makeChoiceGrid(p.choices, p.answer, S.answered===null ? (v)=>doAnswer(v,p.answer) : null)
  );
}

/* ----- MISSING NUMBER ----- */
function renderMissing(content, p){
  content.appendChild(el('div','mode-lbl','❓ Chybějící číslo'));

  const card=el('div','pcard');
  const formula=el('div','formula');

  function numNode(n){ return document.createTextNode(String(n)); }
  function opNode(s){ const sp=el('span',null,s); sp.style.color='#6366f1'; return sp; }
  function missingNode(){
    const box=el('span','mbox');
    if(S.answered!==null){
      const inner=el('span',S.answered?'ans-ok':'ans-no',p.answer);
      box.appendChild(inner);
    } else {
      box.textContent='?';
    }
    return box;
  }
  function eqNode(){ const sp=el('span',null,'='); sp.style.color='#10b981'; return sp; }

  if(p.vt===0){
    // a + ? = c
    formula.appendChild(numNode(p.a));
    formula.appendChild(document.createTextNode(' '));
    formula.appendChild(opNode('+'));
    formula.appendChild(document.createTextNode(' '));
    formula.appendChild(missingNode());
    formula.appendChild(document.createTextNode(' '));
    formula.appendChild(eqNode());
    formula.appendChild(document.createTextNode(` ${p.c}`));
  } else if(p.vt===1){
    // ? + b = c
    formula.appendChild(missingNode());
    formula.appendChild(document.createTextNode(' '));
    formula.appendChild(opNode('+'));
    formula.appendChild(document.createTextNode(` ${p.b} `));
    formula.appendChild(eqNode());
    formula.appendChild(document.createTextNode(` ${p.c}`));
  } else {
    // a − ? = c
    formula.appendChild(numNode(p.a));
    formula.appendChild(document.createTextNode(' '));
    formula.appendChild(opNode('−'));
    formula.appendChild(document.createTextNode(' '));
    formula.appendChild(missingNode());
    formula.appendChild(document.createTextNode(' '));
    formula.appendChild(eqNode());
    formula.appendChild(document.createTextNode(` ${p.c}`));
  }

  card.appendChild(formula);
  content.appendChild(card);

  content.appendChild(
    makeChoiceGrid(p.choices, p.answer, S.answered===null ? (v)=>doAnswer(v,p.answer) : null)
  );
}

/* ----- COMPARE ----- */
function renderCompare(content, p){
  content.appendChild(el('div','mode-lbl','⚖️ Porovnávání — co je více, co je méně?'));

  const card=el('div','pcard');
  const row=el('div','cmp-row');

  function side(n, col){
    const s=el('div','cmp-side');
    s.appendChild(el('div','cmp-num',n));
    s.appendChild(makeDotsVisual(n,col,col));
    return s;
  }

  row.appendChild(side(p.a,'dot-r'));

  const mid=el('div','cmp-mid');
  if(S.answered!==null){
    mid.textContent=p.answer;
    mid.classList.add(S.answered?'ok':'no');
  } else {
    mid.textContent='?';
  }
  row.appendChild(mid);

  row.appendChild(side(p.b,'dot-b'));
  card.appendChild(row);
  content.appendChild(card);

  const btnRow=el('div','cmp-btns');
  [
    {sym:'<', lbl:'méně'},
    {sym:'=', lbl:'stejně'},
    {sym:'>', lbl:'více'},
  ].forEach(opt=>{
    const btn=el('div','cmp-btn');
    btn.appendChild(el('span','cmp-sym',opt.sym));
    btn.appendChild(el('span','cmp-lbl',opt.lbl));
    if(S.answered===null){
      btn.addEventListener('click',()=>doAnswer(opt.sym,p.answer));
    } else {
      if(opt.sym===p.answer) btn.classList.add('ch-ok');
      else if(opt.sym===S.selected) btn.classList.add('ch-no');
    }
    btnRow.appendChild(btn);
  });
  content.appendChild(btnRow);
}

/* ----- NUMBER LINE ----- */
function renderNL(content, p){
  content.appendChild(el('div','mode-lbl','📏 Číselná osa'));

  const card=el('div','pcard');

  const inst=el('div','nl-inst');
  inst.innerHTML=`Kde je číslo <span class="nl-target">${p.target}</span>?`;
  card.appendChild(inst);

  const outer=el('div','nl-outer');
  const nl=el('div','nl');

  for(let i=0;i<=20;i++){
    if(i>0){
      nl.appendChild(el('div','nl-conn'));
    }
    const circle=el('button','nl-circle',i);
    if(S.answered!==null){
      if(i===p.target) circle.classList.add('nl-ok');
      else if(i===S.selected) circle.classList.add('nl-no');
    } else {
      circle.addEventListener('click',()=>{
        doAnswer(i,p.target);
      });
    }
    nl.appendChild(circle);
  }

  outer.appendChild(nl);
  card.appendChild(outer);
  content.appendChild(card);

  // After render: scroll to reveal the target number
  setTimeout(()=>{
    const circles=nl.querySelectorAll('.nl-circle');
    const idx=S.answered!==null ? p.target : p.target;
    if(circles[idx]){
      circles[idx].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
    }
  },80);
}

/* ============================================================
   INIT
============================================================ */
render();
</script>
